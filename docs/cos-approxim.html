<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moindres Carrés — Approximation par Polynôme</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f; --panel: #13131a; --border: #1e1e2e;
    --accent: #7ee8a2; --accent2: #ff6b6b; --accent3: #ffd93d;
    --text: #e0e0e8; --muted: #666680;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'JetBrains Mono',monospace;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; padding:32px 16px;
  }
  header { text-align:center; margin-bottom:36px; animation:fadeDown 0.8s ease both; }
  header h1 {
    font-family:'Playfair Display',serif;
    font-size:clamp(1.3rem,3.5vw,2.1rem); font-weight:400; color:#fff;
  }
  header h1 em { color:var(--accent); font-style:italic; }
  header p { margin-top:8px; font-size:0.75rem; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; }
  .layout {
    display:grid; grid-template-columns:1fr 360px;
    gap:20px; width:100%; max-width:1140px;
    animation:fadeUp 0.8s 0.2s ease both;
  }
  .canvas-wrap {
    background:var(--panel); border:1px solid var(--border);
    border-radius:12px; overflow:hidden;
  }
  canvas { display:block; width:100%; height:auto; }
  .sidebar { display:flex; flex-direction:column; gap:16px; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:20px; }
  .panel-title {
    font-size:0.68rem; text-transform:uppercase; letter-spacing:0.12em;
    color:var(--muted); margin-bottom:14px; padding-bottom:10px;
    border-bottom:1px solid var(--border);
  }
  .control-row { display:flex; flex-direction:column; gap:4px; margin-bottom:14px; }
  .control-row label { font-size:0.72rem; color:var(--muted); display:flex; justify-content:space-between; }
  .control-row label span { color:var(--accent3); font-weight:600; }
  input[type=range] {
    -webkit-appearance:none; width:100%; height:3px;
    background:var(--border); border-radius:2px; outline:none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:14px; height:14px; border-radius:50%;
    background:var(--accent3); cursor:pointer; transition:transform 0.15s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform:scale(1.3); }

  .sub-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:8px; }
  .degree-selector { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:14px; }
  .deg-btn {
    flex:0 0 auto; width:34px; padding:5px 0;
    background:transparent; border:1px solid var(--border);
    border-radius:6px; color:var(--muted);
    font-family:'JetBrains Mono',monospace; font-size:0.7rem;
    cursor:pointer; text-align:center; transition:all 0.15s;
  }
  .deg-btn:hover { border-color:var(--accent3); color:var(--accent3); }
  .deg-btn.active { border-color:var(--accent3); color:var(--accent3); background:rgba(255,217,61,0.1); font-weight:600; }

  .matrix-label { color:var(--muted); font-size:0.63rem; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:5px; }
  .matrix-eq { color:var(--accent); font-size:0.8rem; margin-bottom:3px; }
  .matrix-size { color:var(--muted); font-size:0.6rem; margin-bottom:8px; }
  .matrix-grid {
    display:inline-grid; gap:2px 8px; width:100%;
    background:rgba(126,232,162,0.04); border:1px solid rgba(126,232,162,0.12);
    border-radius:6px; padding:8px 10px; font-size:0.6rem; color:#aaa;
    overflow:hidden;
  }

  .coeff-scroll {
    display:flex; gap:5px; margin-top:10px;
    overflow-x:auto; padding-bottom:4px;
  }
  .coeff-scroll::-webkit-scrollbar { height:3px; }
  .coeff-scroll::-webkit-scrollbar-track { background:var(--border); border-radius:2px; }
  .coeff-scroll::-webkit-scrollbar-thumb { background:var(--accent3); border-radius:2px; }
  .coeff-box {
    flex:0 0 auto; min-width:50px;
    background:rgba(255,107,107,0.08); border:1px solid rgba(255,107,107,0.2);
    border-radius:6px; padding:5px 4px; text-align:center;
  }
  .coeff-box .cn { font-size:0.52rem; color:var(--muted); margin-bottom:2px; }
  .coeff-box .cv { font-size:0.68rem; color:var(--accent2); font-weight:600; }

  .error-bar { margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }
  .error-label {
    font-size:0.63rem; color:var(--muted); text-transform:uppercase;
    letter-spacing:0.1em; margin-bottom:8px; display:flex; justify-content:space-between;
  }
  .error-track { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
  .error-fill {
    height:100%; background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));
    border-radius:3px; transition:width 0.3s ease;
  }
  .legend {
    display:flex; gap:14px; font-size:0.67rem;
    padding:10px 16px; border-top:1px solid var(--border); flex-wrap:wrap;
  }
  .legend-item { display:flex; align-items:center; gap:6px; color:var(--muted); }
  .legend-line { width:20px; height:3px; border-radius:2px; }
  .legend-dot  { width:8px; height:8px; border-radius:50%; }

  .btn {
    width:100%; padding:10px; background:transparent;
    border:1px solid var(--border); border-radius:8px; color:var(--text);
    font-family:'JetBrains Mono',monospace; font-size:0.7rem;
    cursor:pointer; letter-spacing:0.06em; transition:all 0.2s; text-transform:uppercase;
  }
  .btn + .btn { margin-top:8px; }
  .btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(126,232,162,0.05); }
  .btn.active { border-color:var(--accent3); color:var(--accent3); background:rgba(255,217,61,0.06); }

  @keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(20px)}  to{opacity:1;transform:translateY(0)} }
  @media(max-width:780px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <h1>Moindres Carrés — <em>cos(t)</em> ≈ polynôme de degré <em id="headerDeg">3</em></h1>
  <h2>Yehor Korotenko</h2>
  <p>Visualisation de l'approximation polynomiale par régression linéaire</p>
</header>

<div class="layout">
  <div class="canvas-wrap">
    <canvas id="chart" width="760" height="500"></canvas>
    <div class="legend">
      <div class="legend-item"><div class="legend-line" style="background:#7ee8a2"></div> cos(t)</div>
      <div class="legend-item"><div class="legend-line" style="background:#ff6b6b"></div> degré <span id="legendDeg" style="color:var(--accent3);margin-left:3px">3</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffd93d"></div> points</div>
    </div>
  </div>

  <div class="sidebar">
    <div class="panel">
      <div class="panel-title">Paramètres</div>

      <div class="control-row">
        <label>Nb de points N <span id="nVal">12</span></label>
        <input type="range" id="nPoints" min="4" max="40" value="12" step="1">
      </div>
      <div class="control-row">
        <label>Intervalle [<span id="rangeVal">…</span>]</label>
        <input type="range" id="rangeSlider" min="1" max="4" value="2" step="0.1">
      </div>

      <div class="sub-label">Degré du polynôme</div>
      <div class="degree-selector" id="degSel"></div>

      <button class="btn" id="btnResiduals">Afficher les résidus</button>
      <button class="btn" id="btnAnimate">Animer N points</button>
    </div>

    <div class="panel">
      <div class="panel-title">Équations normales A*Ax = A*b</div>

      <div class="matrix-label">Matrice A (3 premières lignes)</div>
      <div class="matrix-size" id="matSize"></div>
      <div class="matrix-grid" id="matGrid"></div>

      <div class="coeff-scroll" id="coeffRow"></div>

      <div class="error-bar">
        <div class="error-label">
          <span>Erreur ‖Ax − b‖²</span>
          <span id="errVal">—</span>
        </div>
        <div class="error-track"><div class="error-fill" id="errFill" style="width:0%"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Linear algebra (vanilla JS) ───────────────────────────────────────────────

function matMul(A,B){
  return A.map(row=>B[0].map((_,j)=>row.reduce((s,v,k)=>s+v*B[k][j],0)));
}
function transpose(A){ return A[0].map((_,j)=>A.map(r=>r[j])); }

function gaussSolve(A,b){
  const n=A.length, M=A.map((r,i)=>[...r,b[i]]);
  for(let c=0;c<n;c++){
    let mx=c;
    for(let r=c+1;r<n;r++) if(Math.abs(M[r][c])>Math.abs(M[mx][c])) mx=r;
    [M[c],M[mx]]=[M[mx],M[c]];
    if(Math.abs(M[c][c])<1e-14) continue;
    for(let r=c+1;r<n;r++){
      const f=M[r][c]/M[c][c];
      for(let k=c;k<=n;k++) M[r][k]-=f*M[c][k];
    }
  }
  const x=new Array(n).fill(0);
  for(let i=n-1;i>=0;i--){
    if(Math.abs(M[i][i])<1e-14) continue;
    x[i]=M[i][n]/M[i][i];
    for(let j=i-1;j>=0;j--) M[j][n]-=M[j][i]*x[i];
  }
  return x;
}

// Vandermonde row: [t^deg, t^(deg-1), ..., t, 1]
function vrow(t,deg){ return Array.from({length:deg+1},(_,k)=>Math.pow(t,deg-k)); }

function fitPoly(ts,ys,deg){
  const A=ts.map(t=>vrow(t,deg)), AT=transpose(A);
  return gaussSolve(matMul(AT,A), AT.map(row=>row.reduce((s,v,i)=>s+v*ys[i],0)));
}

function evalPoly(c,t){ return c.reduce((s,v)=>s*t+v,0); }

// ── Superscript helper ────────────────────────────────────────────────────────
const SUP={'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'};
function sup(n){ return String(n).split('').map(c=>SUP[c]||c).join(''); }
function termLabel(power){
  if(power===0) return '1';
  if(power===1) return 't';
  return 't'+sup(power);
}
const GREEK=['δ','γ','β','α']; // for powers 0,1,2,3; else c_k
function coeffName(power){
  return power<GREEK.length ? GREEK[power] : 'c'+sub(power);
}

// ── State ─────────────────────────────────────────────────────────────────────
let degree=3, showRes=false, animating=false, raf=null;

// ── Build degree buttons ──────────────────────────────────────────────────────
const degSel=document.getElementById('degSel');
for(let d=1;d<=12;d++){
  const b=document.createElement('button');
  b.className='deg-btn'+(d===degree?' active':'');
  b.textContent=d; b.dataset.d=d;
  b.onclick=()=>{
    degree=d;
    degSel.querySelectorAll('.deg-btn').forEach(x=>x.classList.toggle('active',+x.dataset.d===d));
    document.getElementById('headerDeg').textContent=d;
    document.getElementById('legendDeg').textContent=d;
    const sl=document.getElementById('nPoints');
    if(+sl.value<=d+1) sl.value=d+2;
    update();
  };
  degSel.appendChild(b);
}

// ── Canvas setup ──────────────────────────────────────────────────────────────
const cv=document.getElementById('chart'), ctx=cv.getContext('2d');
const W=cv.width, H=cv.height;
const P={t:30,r:30,b:40,l:50};
const PW=W-P.l-P.r, PH=H-P.t-P.b;

function px(t,y,mn,mx,yn,yx){
  return{ x:P.l+(t-mn)/(mx-mn)*PW, y:P.t+(1-(y-yn)/(yx-yn))*PH };
}

function grid(mn,mx,yn,yx){
  ctx.strokeStyle='#1e1e2e'; ctx.lineWidth=1;
  for(let i=0;i<=8;i++){
    const t=mn+i*(mx-mn)/8, {x}=px(t,yn,mn,mx,yn,yx);
    ctx.beginPath();ctx.moveTo(x,P.t);ctx.lineTo(x,P.t+PH);ctx.stroke();
    ctx.fillStyle='#44445a';ctx.font='10px JetBrains Mono';ctx.textAlign='center';
    ctx.fillText(t.toFixed(1),x,P.t+PH+18);
  }
  for(let i=0;i<=6;i++){
    const y=yn+i*(yx-yn)/6, {y:cy}=px(mn,y,mn,mx,yn,yx);
    ctx.beginPath();ctx.moveTo(P.l,cy);ctx.lineTo(P.l+PW,cy);ctx.stroke();
    ctx.fillStyle='#44445a';ctx.font='10px JetBrains Mono';ctx.textAlign='right';
    ctx.fillText(y.toFixed(1),P.l-8,cy+3);
  }
  ctx.strokeStyle='#333348';ctx.lineWidth=1.5;
  const {y:y0}=px(mn,0,mn,mx,yn,yx), {x:x0}=px(0,yn,mn,mx,yn,yx);
  ctx.beginPath();ctx.moveTo(P.l,y0);ctx.lineTo(P.l+PW,y0);ctx.stroke();
  if(x0>=P.l&&x0<=P.l+PW){ctx.beginPath();ctx.moveTo(x0,P.t);ctx.lineTo(x0,P.t+PH);ctx.stroke();}
}

function curve(fn,mn,mx,yn,yx,col,lw=2){
  ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=lw;
  let first=true;
  for(let i=0;i<=600;i++){
    const t=mn+i*(mx-mn)/600, v=fn(t);
    if(!isFinite(v)||v<yn-5*(yx-yn)||v>yx+5*(yx-yn)){first=true;continue;}
    const {x,y}=px(t,v,mn,mx,yn,yx);
    first?(ctx.moveTo(x,y),first=false):ctx.lineTo(x,y);
  }
  ctx.stroke();
}

function dots(ts,ys,mn,mx,yn,yx){
  ts.forEach((t,i)=>{
    const {x,y}=px(t,ys[i],mn,mx,yn,yx);
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle='#ffd93d';ctx.shadowColor='#ffd93d';ctx.shadowBlur=8;
    ctx.fill();ctx.shadowBlur=0;
  });
}

function residuals(ts,ys,fn,mn,mx,yn,yx){
  ctx.strokeStyle='rgba(255,217,61,0.35)';ctx.lineWidth=1;
  ts.forEach((t,i)=>{
    const p1=px(t,ys[i],mn,mx,yn,yx), p2=px(t,fn(t),mn,mx,yn,yx);
    ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
  });
}

// ── Main update ───────────────────────────────────────────────────────────────
function update(){
  const N=+document.getElementById('nPoints').value;
  const r=+document.getElementById('rangeSlider').value;
  const mn=-r*Math.PI/2, mx=r*Math.PI/2;
  const safeN=Math.max(N,degree+2);

  const ts=Array.from({length:safeN},(_,i)=>mn+i*(mx-mn)/(safeN-1));
  const ys=ts.map(t=>Math.cos(t));
  const coeffs=fitPoly(ts,ys,degree);
  const pf=t=>evalPoly(coeffs,t);

  // y-range: sample poly densely, clamp wild oscillations
  const pvs=Array.from({length:300},(_,i)=>{ const v=pf(mn+i*(mx-mn)/299); return isFinite(v)?v:0; });
  const allY=[...pvs,...ys];
  let yn=Math.min(...allY)-0.2, yx=Math.max(...allY)+0.2;
  const span=yx-yn; if(span>20){yn=Math.min(...ys)-0.3;yx=Math.max(...ys)+0.3;}

  const err=ts.reduce((s,t,i)=>s+(pf(t)-ys[i])**2,0);

  // Draw
  ctx.clearRect(0,0,W,H);
  grid(mn,mx,yn,yx);
  if(showRes) residuals(ts,ys,pf,mn,mx,yn,yx);

  // Shade gap
  ctx.globalAlpha=0.05;ctx.fillStyle='#ff6b6b';ctx.beginPath();
  for(let i=0;i<=400;i++){
    const t=mn+i*(mx-mn)/400, {x,y}=px(t,pf(t),mn,mx,yn,yx);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  for(let i=400;i>=0;i--){
    const {x,y}=px(mn+i*(mx-mn)/400,Math.cos(mn+i*(mx-mn)/400),mn,mx,yn,yx);
    ctx.lineTo(x,y);
  }
  ctx.closePath();ctx.fill();ctx.globalAlpha=1;

  curve(t=>Math.cos(t),mn,mx,yn,yx,'#7ee8a2',2.5);
  curve(pf,mn,mx,yn,yx,'#ff6b6b',2);
  dots(ts,ys,mn,mx,yn,yx);

  // UI
  document.getElementById('nVal').textContent=safeN;
  document.getElementById('rangeVal').textContent=`${mn.toFixed(2)}, ${mx.toFixed(2)}`;
  document.getElementById('errVal').textContent=err.toFixed(6);
  document.getElementById('errFill').style.width=Math.min(err/(safeN*0.5)*100,100)+'%';

  // Matrix preview
  const cols=degree+1;
  document.getElementById('matSize').textContent=`A ∈ ℝ^{${safeN} × ${cols}}  (${safeN} lignes, ${cols} colonnes)`;
  const mg=document.getElementById('matGrid');
  mg.innerHTML='';
  // show max 8 cols to avoid overflow
  const showCols=Math.min(cols,8);
  mg.style.gridTemplateColumns=`repeat(${showCols},1fr)`;
  // headers
  for(let k=0;k<cols;k++){
    if(k>=showCols) break;
    const el=document.createElement('span');
    el.style.color='#7ee8a2';el.textContent=termLabel(degree-k);mg.appendChild(el);
  }
  if(cols>showCols){
    const el=document.createElement('span');el.style.color='#444';el.textContent='…';mg.appendChild(el);
  }
  // first 3 rows
  ts.slice(0,3).forEach(t=>{
    vrow(t,degree).forEach((v,k)=>{
      if(k>=showCols) return;
      const el=document.createElement('span');
      el.textContent=v.toFixed(2);mg.appendChild(el);
    });
    if(cols>showCols){const el=document.createElement('span');el.style.color='#444';el.textContent='…';mg.appendChild(el);}
  });
  const dl=document.createElement('span');
  dl.style.gridColumn='1/-1';dl.style.color='#444';dl.textContent='⋮';mg.appendChild(dl);

  // Coefficients
  const cr=document.getElementById('coeffRow');cr.innerHTML='';
  coeffs.forEach((c,k)=>{
    const power=degree-k;
    const box=document.createElement('div');box.className='coeff-box';
    const label=power<GREEK.length?GREEK[power]:'c'+sub(power);
    box.innerHTML=`<div class="cn">${label}&thinsp;(${termLabel(power)})</div><div class="cv">${c.toFixed(3)}</div>`;
    cr.appendChild(box);
  });
}

function sub(n){ return String(n).split('').map(c=>({'0':'₀','1':'₁','2':'₂','3':'₃','4':'₄','5':'₅','6':'₆','7':'₇','8':'₈','9':'₉'}[c]||c)).join(''); }

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('nPoints').addEventListener('input',update);
document.getElementById('rangeSlider').addEventListener('input',update);

document.getElementById('btnResiduals').addEventListener('click',function(){
  showRes=!showRes;
  this.classList.toggle('active',showRes);
  this.textContent=showRes?'Masquer les résidus':'Afficher les résidus';
  update();
});

document.getElementById('btnAnimate').addEventListener('click',function(){
  if(animating){animating=false;cancelAnimationFrame(raf);this.textContent='Animer N points';return;}
  animating=true;this.textContent='Stop';
  const sl=document.getElementById('nPoints');
  let n=Math.max(degree+2,4),dir=1;
  (function step(){
    if(!animating)return;
    n+=dir; if(n>=40)dir=-1; if(n<=Math.max(degree+2,4))dir=1;
    sl.value=n; update(); raf=requestAnimationFrame(step);
  })();
});

update();
</script>
</body>
</html>
