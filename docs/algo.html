<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Distributed Systems — Interactive Animated Textbook by Yehor Korotenko</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#0B1121;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:#0F1729;}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#475569;}
button{font-family:inherit;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Animation Engine ───
function useAnimation(steps, autoPlaySpeed = 1200) {
  const [step, setStep] = useState(0);
  const [playing, setPlaying] = useState(false);
  const timer = useRef(null);

  useEffect(() => {
    if (playing && step < steps.length - 1) {
      timer.current = setTimeout(() => setStep(s => s + 1), autoPlaySpeed);
    } else if (step >= steps.length - 1) {
      setPlaying(false);
    }
    return () => clearTimeout(timer.current);
  }, [playing, step, steps.length, autoPlaySpeed]);

  const reset = () => { setPlaying(false); setStep(0); };
  const next = () => { if (step < steps.length - 1) setStep(s => s + 1); };
  const prev = () => { if (step > 0) setStep(s => s - 1); };
  const play = () => setPlaying(true);
  const pause = () => setPlaying(false);

  return { step, playing, reset, next, prev, play, pause, total: steps.length };
}

function Controls({ anim, color }) {
  const bg = "#0F1729";
  const btn = (onClick, label, disabled = false) => (
    <button onClick={onClick} disabled={disabled} style={{
      background: disabled ? "#1a2332" : "#1e293b", border: `1px solid ${disabled ? "#1a2332" : color}44`,
      color: disabled ? "#334155" : color, cursor: disabled ? "default" : "pointer",
      padding: "5px 12px", borderRadius: 4, fontSize: 12, fontFamily: "'JetBrains Mono', monospace", transition: "all 0.15s"
    }}>{label}</button>
  );
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 0", flexWrap: "wrap" }}>
      {btn(anim.reset, "⟳ Reset")}
      {btn(anim.prev, "◀ Prev", anim.step === 0)}
      {anim.playing ? btn(anim.pause, "⏸ Pause") : btn(anim.play, "▶ Play", anim.step >= anim.total - 1)}
      {btn(anim.next, "Next ▶", anim.step >= anim.total - 1)}
      <span style={{ fontSize: 11, color: "#64748b", fontFamily: "monospace", marginLeft: 8 }}>
        Step {anim.step + 1} / {anim.total}
      </span>
    </div>
  );
}

function AnimContainer({ children, narration, color }) {
  return (
    <div style={{ background: "#0D1525", border: "1px solid #1e293b", borderRadius: 8, overflow: "hidden" }}>
      <div style={{ padding: 20, display: "flex", justifyContent: "center" }}>{children}</div>
      {narration && (
        <div style={{ padding: "12px 20px", borderTop: "1px solid #1e293b", background: `${color}08`, fontSize: 13, fontFamily: "'JetBrains Mono', monospace", color: "#cbd5e1", lineHeight: 1.6, minHeight: 48 }}>
          {narration}
        </div>
      )}
    </div>
  );
}

// ─── Helpers ───
const lerp = (a, b, t) => a + (b - a) * Math.min(1, Math.max(0, t));
const C = { bg: "#0D1525", line: "#334155", text: "#94a3b8", white: "#f1f5f9" };

// ═══════════════════════════════════════════════
// ANIMATION: Causality
// ═══════════════════════════════════════════════
function CausalityAnim({ color }) {
  const steps = [
    { desc: "Three processes P1, P2, P3 run independently. No events yet." },
    { desc: "P1 performs local event e1. This is an internal action on P1." },
    { desc: "P1 sends message m1 to P2. The send is part of e1's causal future." },
    { desc: "P2 receives m1 → event e2. Since e1 (send) happened before e2 (receive), we have e1 → e2." },
    { desc: "P2 sends message m2 to P3 after e2." },
    { desc: "P3 receives m2 → event e3. By transitivity: e1 → e2 → e3, so e1 → e3." },
    { desc: "P1 does local event e4. e4 has NO causal link to e2 or e3 → e4 ∥ e2 and e4 ∥ e3 (concurrent)." },
    { desc: "Summary: e1→e2→e3 (causal chain). e4∥e2, e4∥e3 (concurrent). Causality = partial order on events." },
  ];
  const anim = useAnimation(steps);
  const s = anim.step;

  return (
    <div>
      <AnimContainer narration={steps[s].desc} color={color}>
        <svg viewBox="0 0 500 220" style={{ width: "100%", maxHeight: 220 }}>
          <defs>
            <marker id="ca" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill={color} /></marker>
            <marker id="ca2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4ECDC4" /></marker>
          </defs>
          {/* Process lines */}
          {["P1","P2","P3"].map((p,i) => (
            <g key={p}>
              <text x="12" y={50+i*70+4} fill={C.text} fontSize="12" fontFamily="monospace">{p}</text>
              <line x1="45" y1={50+i*70} x2="480" y2={50+i*70} stroke={C.line} strokeWidth="2"/>
            </g>
          ))}
          {/* e1 */}
          {s >= 1 && <><circle cx="100" cy="50" r="7" fill={color}><animate attributeName="r" from="0" to="7" dur="0.3s"/></circle><text x="90" y="35" fill={color} fontSize="10" fontFamily="monospace">e1</text></>}
          {/* m1 arrow */}
          {s >= 2 && <line x1="107" y1="57" x2={s>=3?"218":"160"} y2={s>=3?"113":"85"} stroke={color} strokeWidth="1.5" markerEnd="url(#ca)" strokeDasharray="5" opacity="0.8"/>}
          {s >= 2 && s < 3 && <text x="140" y="75" fill={color} fontSize="9" fontFamily="monospace">m1 ✉</text>}
          {/* e2 */}
          {s >= 3 && <><circle cx="225" cy="120" r="7" fill={color}><animate attributeName="r" from="0" to="7" dur="0.3s"/></circle><text x="215" y="105" fill={color} fontSize="10" fontFamily="monospace">e2</text></>}
          {s >= 3 && <text x="135" y="80" fill="#22D3EE" fontSize="9" fontFamily="monospace">e1 → e2</text>}
          {/* m2 arrow */}
          {s >= 4 && <line x1="232" y1="127" x2={s>=5?"338":"285"} y2={s>=5?"183":"155"} stroke={color} strokeWidth="1.5" markerEnd="url(#ca)" strokeDasharray="5" opacity="0.8"/>}
          {/* e3 */}
          {s >= 5 && <><circle cx="345" cy="190" r="7" fill={color}><animate attributeName="r" from="0" to="7" dur="0.3s"/></circle><text x="335" y="175" fill={color} fontSize="10" fontFamily="monospace">e3</text></>}
          {s >= 5 && <text x="260" y="155" fill="#22D3EE" fontSize="9" fontFamily="monospace">e2 → e3</text>}
          {/* e4 */}
          {s >= 6 && <><circle cx="300" cy="50" r="7" fill="#4ECDC4"><animate attributeName="r" from="0" to="7" dur="0.3s"/></circle><text x="290" y="35" fill="#4ECDC4" fontSize="10" fontFamily="monospace">e4</text></>}
          {s >= 6 && <>
            <line x1="300" y1="58" x2="225" y2="112" stroke="#4ECDC4" strokeWidth="1" strokeDasharray="3" opacity="0.4"/>
            <text x="240" y="75" fill="#4ECDC4" fontSize="9" fontFamily="monospace">e4 ∥ e2</text>
          </>}
          {/* Summary highlights */}
          {s >= 7 && <>
            <rect x="85" y="30" width="275" height="175" rx="8" fill="none" stroke="#22D3EE" strokeWidth="1" strokeDasharray="4" opacity="0.3"/>
            <text x="380" y="50" fill="#22D3EE" fontSize="10" fontFamily="monospace">causal</text>
            <text x="380" y="65" fill="#22D3EE" fontSize="10" fontFamily="monospace">chain ↓</text>
            <text x="380" y="130" fill="#4ECDC4" fontSize="10" fontFamily="monospace">concurrent</text>
            <text x="380" y="145" fill="#4ECDC4" fontSize="10" fontFamily="monospace">events ↗</text>
          </>}
        </svg>
      </AnimContainer>
      <Controls anim={anim} color={color} />
    </div>
  );
}

// ═══════════════════════════════════════════════
// ANIMATION: Lamport Clocks
// ═══════════════════════════════════════════════
function LamportAnim({ color }) {
  const steps = [
    { desc: "Two processes P1 and P2, both start with Lamport clock C = 0.", c1: 0, c2: 0 },
    { desc: "P1 does local event a. Rule: C = C+1. P1's clock becomes 1.", c1: 1, c2: 0, ev: "e1" },
    { desc: "P1 sends message to P2 with timestamp C=1 attached.", c1: 1, c2: 0, msg: true },
    { desc: "P2 receives msg(ts=1). Rule: C = max(C, ts) + 1 = max(0,1)+1 = 2.", c1: 1, c2: 2, recv: true },
    { desc: "P2 does local event. C = C+1 = 3.", c1: 1, c2: 3 },
    { desc: "P1 does local event. C = C+1 = 2. Note: P1(C=2) and P2(C=2) were concurrent — same timestamp!", c1: 2, c2: 3, concurrent: true },
    { desc: "Key insight: e1→e2 implies L(e1)<L(e2), but L(a)<L(b) does NOT imply a→b. Lamport clocks cannot detect concurrency.", c1: 2, c2: 3 },
  ];
  const anim = useAnimation(steps);
  const s = anim.step;
  const st = steps[s];

  return (
    <div>
      <AnimContainer narration={st.desc} color={color}>
        <svg viewBox="0 0 480 180" style={{ width: "100%", maxHeight: 180 }}>
          <defs><marker id="la" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill={color}/></marker></defs>
          <text x="12" y="54" fill={C.text} fontSize="11" fontFamily="monospace">P1</text>
          <line x1="45" y1="50" x2="460" y2="50" stroke={C.line} strokeWidth="2"/>
          <text x="12" y="134" fill={C.text} fontSize="11" fontFamily="monospace">P2</text>
          <line x1="45" y1="130" x2="460" y2="130" stroke={C.line} strokeWidth="2"/>

          {/* Clock displays */}
          <rect x="390" y="32" width="70" height="25" rx="4" fill="#1e293b" stroke={color} strokeWidth="1" opacity="0.6"/>
          <text x="398" y="50" fill={color} fontSize="11" fontFamily="monospace">C₁ = {st.c1}</text>
          <rect x="390" y="112" width="70" height="25" rx="4" fill="#1e293b" stroke="#4ECDC4" strokeWidth="1" opacity="0.6"/>
          <text x="398" y="130" fill="#4ECDC4" fontSize="11" fontFamily="monospace">C₂ = {st.c2}</text>

          {/* Events on P1 */}
          {s >= 1 && <circle cx="100" cy="50" r="6" fill={color}/>}
          {s >= 1 && <text x="88" y="38" fill={color} fontSize="9" fontFamily="monospace">C=1</text>}
          {s >= 5 && <circle cx="280" cy="50" r="6" fill={st.concurrent ? "#ef4444" : color}/>}
          {s >= 5 && <text x="268" y="38" fill={st.concurrent ? "#ef4444" : color} fontSize="9" fontFamily="monospace">C=2</text>}

          {/* Message */}
          {(s === 2) && <>
            <line x1="106" y1="56" x2="180" y2="95" stroke={color} strokeWidth="1.5" strokeDasharray="4" opacity="0.7"/>
            <text x="130" y="73" fill={color} fontSize="9" fontFamily="monospace">msg(1) ✉</text>
          </>}
          {s >= 3 && <line x1="106" y1="56" x2="194" y2="124" stroke={color} strokeWidth="1.5" markerEnd="url(#la)" strokeDasharray="4" opacity="0.6"/>}

          {/* Events on P2 */}
          {s >= 3 && <circle cx="200" cy="130" r="6" fill="#4ECDC4"/>}
          {s >= 3 && <text x="185" y="155" fill="#4ECDC4" fontSize="9" fontFamily="monospace">C=2</text>}
          {s >= 4 && <circle cx="260" cy="130" r="6" fill="#4ECDC4"/>}
          {s >= 4 && <text x="248" y="155" fill="#4ECDC4" fontSize="9" fontFamily="monospace">C=3</text>}

          {/* Concurrent highlight */}
          {s >= 5 && st.concurrent && <>
            <line x1="280" y1="58" x2="200" y2="122" stroke="#ef4444" strokeWidth="1" strokeDasharray="3" opacity="0.5"/>
            <text x="215" y="90" fill="#ef4444" fontSize="9" fontFamily="monospace">same ts! concurrent</text>
          </>}

          {/* Final note */}
          {s >= 6 && <text x="60" y="175" fill="#64748b" fontSize="10" fontFamily="monospace">⚠ L(a){"<"}L(b) ⇏ a→b   |   a→b ⇒ L(a){"<"}L(b) ✓</text>}
        </svg>
      </AnimContainer>
      <Controls anim={anim} color={color} />
    </div>
  );
}

// ═══════════════════════════════════════════════
// ANIMATION: Vector Clocks
// ═══════════════════════════════════════════════
function VectorAnim({ color }) {
  const steps = [
    { desc: "Three processes start with vector clocks [0,0,0]. Each position tracks that process's knowledge.", v: [[0,0,0],[0,0,0],[0,0,0]] },
    { desc: "P1 local event: increment own position → [1,0,0].", v: [[1,0,0],[0,0,0],[0,0,0]], ev: [0] },
    { desc: "P1 sends msg to P2, attaching vector [1,0,0].", v: [[1,0,0],[0,0,0],[0,0,0]], msg: [0,1] },
    { desc: "P2 receives: V = max([0,0,0],[1,0,0]) = [1,0,0], then increment own → [1,1,0].", v: [[1,0,0],[1,1,0],[0,0,0]], ev: [1] },
    { desc: "P2 sends msg to P3 with [1,1,0].", v: [[1,0,0],[1,1,0],[0,0,0]], msg: [1,2] },
    { desc: "P3 receives: V = max([0,0,0],[1,1,0]) = [1,1,0], increment → [1,1,1].", v: [[1,0,0],[1,1,0],[1,1,1]], ev: [2] },
    { desc: "P1 local event → [2,0,0]. Compare: [2,0,0] vs [1,1,0] — neither ≤ other → CONCURRENT! Vector clocks detect this.", v: [[2,0,0],[1,1,0],[1,1,1]], ev: [0], compare: true },
    { desc: "[1,0,0] ≤ [1,1,1] (componentwise) → P1's first event causally precedes P3's event. Vector clocks capture exact causality!", v: [[2,0,0],[1,1,0],[1,1,1]], final: true },
  ];
  const anim = useAnimation(steps);
  const s = anim.step;
  const st = steps[s];
  const fmtV = (v) => `[${v.join(",")}]`;

  const py = [44, 104, 164];
  const evX = [100, 220, 350];

  return (
    <div>
      <AnimContainer narration={st.desc} color={color}>
        <svg viewBox="0 0 500 210" style={{ width: "100%", maxHeight: 210 }}>
          <defs><marker id="va" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#A78BFA"/></marker></defs>
          {["P1","P2","P3"].map((p,i) => (
            <g key={p}>
              <text x="8" y={py[i]+4} fill={C.text} fontSize="11" fontFamily="monospace">{p}</text>
              <line x1="40" y1={py[i]} x2="470" y2={py[i]} stroke={C.line} strokeWidth="2"/>
              {/* Current vector */}
              <rect x="400" y={py[i]-12} width="68" height="22" rx="3" fill="#1e293b" stroke={["#E8A838","#4ECDC4","#FF6B6B"][i]} strokeWidth="0.8"/>
              <text x="406" y={py[i]+4} fill={["#E8A838","#4ECDC4","#FF6B6B"][i]} fontSize="9" fontFamily="monospace">{fmtV(st.v[i])}</text>
            </g>
          ))}
          {/* Events */}
          {s >= 1 && <circle cx={evX[0]} cy={py[0]} r="5" fill="#E8A838"/>}
          {s >= 1 && <text x={evX[0]-20} y={py[0]-12} fill="#E8A838" fontSize="8" fontFamily="monospace">[1,0,0]</text>}
          {(s===2) && <line x1={evX[0]+5} y1={py[0]+5} x2={170} y2={py[1]-10} stroke="#A78BFA" strokeWidth="1.5" strokeDasharray="4"/>}
          {s >= 3 && <>
            <line x1={evX[0]+5} y1={py[0]+5} x2={evX[1]-5} y2={py[1]-5} stroke="#A78BFA" strokeWidth="1.5" markerEnd="url(#va)" strokeDasharray="4" opacity="0.5"/>
            <circle cx={evX[1]} cy={py[1]} r="5" fill="#4ECDC4"/>
            <text x={evX[1]-20} y={py[1]-12} fill="#4ECDC4" fontSize="8" fontFamily="monospace">[1,1,0]</text>
          </>}
          {(s===4) && <line x1={evX[1]+5} y1={py[1]+5} x2={290} y2={py[2]-10} stroke="#A78BFA" strokeWidth="1.5" strokeDasharray="4"/>}
          {s >= 5 && <>
            <line x1={evX[1]+5} y1={py[1]+5} x2={evX[2]-5} y2={py[2]-5} stroke="#A78BFA" strokeWidth="1.5" markerEnd="url(#va)" strokeDasharray="4" opacity="0.5"/>
            <circle cx={evX[2]} cy={py[2]} r="5" fill="#FF6B6B"/>
            <text x={evX[2]-20} y={py[2]+18} fill="#FF6B6B" fontSize="8" fontFamily="monospace">[1,1,1]</text>
          </>}
          {s >= 6 && <>
            <circle cx="300" cy={py[0]} r="5" fill={st.compare?"#ef4444":"#E8A838"}/>
            <text x="278" y={py[0]-12} fill={st.compare?"#ef4444":"#E8A838"} fontSize="8" fontFamily="monospace">[2,0,0]</text>
          </>}
          {s >= 6 && st.compare && <>
            <line x1="300" y1={py[0]+8} x2="220" y2={py[1]-8} stroke="#ef4444" strokeWidth="1" strokeDasharray="3" opacity="0.6"/>
            <text x="240" y={py[0]+30} fill="#ef4444" fontSize="8" fontFamily="monospace">∥ concurrent!</text>
          </>}
          {s >= 7 && st.final && <>
            <line x1={evX[0]} y1={py[0]+8} x2={evX[2]} y2={py[2]-8} stroke="#22D3EE" strokeWidth="1.5" strokeDasharray="4" opacity="0.6"/>
            <text x="170" y="200" fill="#22D3EE" fontSize="9" fontFamily="monospace">✓ V(a) ≤ V(b) ⟺ a → b (exact causality!)</text>
          </>}
        </svg>
      </AnimContainer>
      <Controls anim={anim} color={color} />
    </div>
  );
}

// ═══════════════════════════════════════════════
// ANIMATION: Basic Diffusion (Flooding)
// ═══════════════════════════════════════════════
function FloodingAnim({ color }) {
  const nodes = [{id:"A",x:200,y:40},{id:"B",x:100,y:120},{id:"C",x:300,y:120},{id:"D",x:200,y:200}];
  const edges = [[0,1],[0,2],[1,2],[1,3],[2,3]];
  const steps = [
    { desc: "Network with 4 nodes (A,B,C,D) and 5 edges. A will initiate flooding.", informed: [0], msgs: [] },
    { desc: "A sends message to all neighbors: B and C.", informed: [0], msgs: [[0,1],[0,2]] },
    { desc: "B and C receive. They are now informed. Both forward to their uninformed neighbors.", informed: [0,1,2], msgs: [[1,2],[1,3],[2,1],[2,3]] },
    { desc: "B→C: C already informed (ignored). C→B: B already informed (ignored). B→D: D receives. C→D: D already got it from B (ignored).", informed: [0,1,2,3], msgs: [[1,3]] },
    { desc: "All nodes informed! Total messages sent across edges: at most 2×|E| = 10, but effective messages = 5. Time = O(diameter).", informed: [0,1,2,3], msgs: [], done: true },
  ];
  const anim = useAnimation(steps, 1500);
  const s = anim.step;
  const st = steps[s];

  return (
    <div>
      <AnimContainer narration={st.desc} color={color}>
        <svg viewBox="0 0 400 240" style={{ width: "100%", maxHeight: 240 }}>
          {edges.map(([a,b],i) => (
            <line key={i} x1={nodes[a].x} y1={nodes[a].y} x2={nodes[b].x} y2={nodes[b].y} stroke={C.line} strokeWidth="1.5"/>
          ))}
          {st.msgs.map(([a,b],i) => {
            const dx = nodes[b].x-nodes[a].x, dy = nodes[b].y-nodes[a].y;
            const len = Math.sqrt(dx*dx+dy*dy);
            return <line key={`m${i}`} x1={nodes[a].x+dx*0.15} y1={nodes[a].y+dy*0.15} x2={nodes[a].x+dx*0.7} y2={nodes[a].y+dy*0.7} stroke={color} strokeWidth="2" strokeDasharray="4" opacity="0.8"/>;
          })}
          {nodes.map((n,i) => {
            const inf = st.informed.includes(i);
            return (
              <g key={n.id}>
                <circle cx={n.x} cy={n.y} r="20" fill={inf ? color : "#1e293b"} stroke={inf ? color : C.line} strokeWidth="2" opacity={inf ? (i===0?1:0.75) : 0.5}>
                  {inf && <animate attributeName="opacity" from="0.3" to={i===0?1:0.75} dur="0.4s"/>}
                </circle>
                <text x={n.x-5} y={n.y+5} fill={inf?"#0f172a":"#94a3b8"} fontSize="13" fontWeight="bold" fontFamily="monospace">{n.id}</text>
              </g>
            );
          })}
          {st.done && <text x="110" y="235" fill="#22D3EE" fontSize="10" fontFamily="monospace">✓ All informed | Msgs ≤ 2|E| | Time = O(diam)</text>}
        </svg>
      </AnimContainer>
      <Controls anim={anim} color={color} />
    </div>
  );
}

// ═══════════════════════════════════════════════
// ANIMATION: Tree Diffusion
// ═══════════════════════════════════════════════
function TreeDiffusionAnim({ color }) {
  const nodes = [{id:"A",x:200,y:30},{id:"B",x:110,y:100},{id:"C",x:290,y:100},{id:"D",x:65,y:170},{id:"E",x:155,y:170}];
  const treeEdges = [[0,1],[0,2],[1,3],[1,4]];
  const steps = [
    { desc: "Pre-built spanning tree rooted at A. Edges: A→B, A→C, B→D, B→E. Only N-1=4 messages needed!", active: [0], msgs: [] },
    { desc: "A sends to children B and C (2 messages).", active: [0], msgs: [[0,1],[0,2]] },
    { desc: "B and C receive. B forwards to children D and E (2 messages). C is a leaf — done.", active: [0,1,2], msgs: [[1,3],[1,4]] },

          {st.msgs.map(([a,b],i) => {
            const na=nodes[a],nb=nodes[b];

        </svg>
      </AnimContainer>
      <Controls anim={anim} color={color} />
    </div>
  );
}

function BellmanFordAnim({ color }) {
  const nodes = [{id:"A",x:60,y:90},{id:"B",x:170,y:90},{id:"C",x:280,y:90},{id:"D",x:390,y:90}];
  const edges = [[0,1],[1,2],[2,3],[0,2]]; // A-C shortcut
  const steps = [
    { desc: "Network: A—B—C—D with shortcut A—C. Goal: shortest-path tree from A.", dist: [0,"∞","∞","∞"], parent: [null,null,null,null] },
    { desc: "Round 1: A (d=0) broadcasts. B hears d=0+1=1 → parent=A. C hears d=0+1=1 via shortcut → parent=A.", dist: [0,1,1,"∞"], parent: [null,"A","A",null] },
    { desc: "Round 2: B (d=1) tells C d=2 — but C already has d=1, ignore. C (d=1) tells D d=2 → parent=C.", dist: [0,1,1,2], parent: [null,"A","A","C"] },
    { desc: "Round 3: No updates → CONVERGED. Shortest-path tree: A→B(d=1), A→C(d=1, via shortcut), C→D(d=2).", dist: [0,1,1,2], parent: [null,"A","A","C"], done: true },
  ];
  const anim = useAnimation(steps, 2000);
  const s = anim.step; const st = steps[s];

  return (
    <div>
      <AnimContainer narration={st.desc} color={color}>
        <svg viewBox="0 0 460 180" style={{ width: "100%", maxHeight: 180 }}>
          {edges.map(([a,b],i) => {
            const isShortcut = a===0 && b===2;
            return isShortcut ?
              <path key={i} d={`M ${nodes[a].x} ${nodes[a].y-15} Q ${(nodes[a].x+nodes[b].x)/2} 25 ${nodes[b].x} ${nodes[b].y-15}`} fill="none" stroke="#E8A838" strokeWidth="1.5" strokeDasharray="4"/> :
              <line key={i} x1={nodes[a].x} y1={nodes[a].y} x2={nodes[b].x} y2={nodes[b].y} stroke={C.line} strokeWidth="2"/>;
          })}
          {/* Tree edges */}
          {st.parent[1]==="A" && <line x1={nodes[0].x} y1={nodes[0].y} x2={nodes[1].x} y2={nodes[1].y} stroke={color} strokeWidth="3"/>}
          {st.parent[2]==="A" && <path d={`M ${nodes[0].x} ${nodes[0].y-15} Q ${(nodes[0].x+nodes[2].x)/2} 25 ${nodes[2].x} ${nodes[2].y-15}`} fill="none" stroke={color} strokeWidth="3"/>}
          {st.parent[3]==="C" && <line x1={nodes[2].x} y1={nodes[2].y} x2={nodes[3].x} y2={nodes[3].y} stroke={color} strokeWidth="3"/>}
          {nodes.map((n,i) => (
            <g key={n.id}>
              <circle cx={n.x} cy={n.y} r="22" fill={st.dist[i]!=="∞"?color:"#1e293b"} stroke={color} strokeWidth="2" opacity={st.dist[i]!=="∞"?0.85:0.3}/>
              <text x={n.x-5} y={n.y+5} fill={st.dist[i]!=="∞"?"#0f172a":"#64748b"} fontSize="13" fontWeight="bold" fontFamily="monospace">{n.id}</text>
              <text x={n.x-10} y={n.y+38} fill={color} fontSize="10" fontFamily="monospace">d={st.dist[i]}</text>
              {st.parent[i] && <text x={n.x-15} y={n.y-28} fill="#22D3EE" fontSize="9" fontFamily="monospace">←{st.parent[i]}</text>}
            </g>
          ))}
          {st.done && <text x="80" y="175" fill="#22D3EE" fontSize="10" fontFamily="monospace">✓ Shortest-path tree | O(N²|E|) msgs | O(N) rounds</text>}
        </svg>
      </AnimContainer>
      <Controls anim={anim} color={color} />
    </div>
  );
}

          {st.msgs.includes("P2→REQ") && <line x1="200" y1="135" x2="200" y2="60" stroke={color} strokeWidth="1.5" strokeDasharray="4"/>}

// ANIMATION: Lamport mutex — 3(n-1) complexity breakdown
// ═══════════════════════════════════════════════
function LamportComplexityAnim({ color }) {
  const N = 5;
  const xs = [70, 130, 200, 270, 340];
  const cy = 110;
  const me = 0; // P1 is the entering process
  const steps = [
    { desc: "Process P1 wants to enter the critical section. We count the messages emitted during ONE complete entry/exit cycle in Lamport's algorithm.", phase: 0, sent: 0 },
    { desc: "Phase 1 — diffusion de la demande. P1 broadcasts (D, C₁, 1) to the n−1 = 4 other processes. Cost: n − 1 messages.", phase: 1, sent: 4 },
    { desc: "Phase 2 — acquittements. Every other process answers with (Acq, C₁, i). Cost: n − 1 more messages. These acquittements are needed by P1 to know its own ts is the smallest.", phase: 2, sent: 4+4 },
    { desc: "Phase 3 — diffusion de la sortie. After using the CS, P1 broadcasts (sortie, C₁′) to everyone. Cost: n − 1 messages.", phase: 3, sent: 4+4+4 },
    { desc: "Total = 3 × (n − 1) messages per entry, regardless of graph. Over a complete graph this is O(n); over a ring each broadcast takes up to n−1 hops → O(n²) in link-hops.", phase: 4, sent: 12, done: true },
  ];
  const anim = useAnimation(steps, 1900);
  const s = anim.step, st = steps[s];
  // Colors per phase arrow
  const phaseCol = { 1: "#E8A838", 2: "#4ECDC4", 3: "#22D3EE" };
  return (
    <div>
      <AnimContainer narration={st.desc} color={color}>
        <svg viewBox="0 0 400 230" style={{ width: "100%", maxHeight: 240 }}>
          <defs>
            <marker id="lcD" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#E8A838"/></marker>
            <marker id="lcA" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#4ECDC4"/></marker>
            <marker id="lcS" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#22D3EE"/></marker>
          </defs>
          {xs.map((x, i) => (
            <g key={i}>
              <circle cx={x} cy={cy} r="16" fill={i===me?`${color}40`:"#1e293b"} stroke={color} strokeWidth={i===me?2.5:1.5}/>
              <text x={x} y={cy+4} textAnchor="middle" fill={color} fontSize="10" fontWeight={i===me?"bold":"normal"} fontFamily="monospace">P{i+1}</text>
            </g>
          ))}
          {/* Phase 1 arrows (D) */}
          {st.phase >= 1 && xs.map((x, i) => i!==me && (
            <line key={`d${i}`} x1={xs[me]+14} y1={cy-8} x2={x-12} y2={cy-8} stroke="#E8A838" strokeWidth="1.6" markerEnd="url(#lcD)" opacity={st.phase===1?1:0.35}/>
          ))}
          {/* Phase 2 arrows (Acq) — reply */}
          {st.phase >= 2 && xs.map((x, i) => i!==me && (
            <line key={`a${i}`} x1={x-12} y1={cy+10} x2={xs[me]+14} y2={cy+10} stroke="#4ECDC4" strokeWidth="1.6" markerEnd="url(#lcA)" opacity={st.phase===2?1:0.35}/>
          ))}
          {/* Phase 3 arrows (sortie) */}
          {st.phase >= 3 && xs.map((x, i) => i!==me && (
            <line key={`s${i}`} x1={xs[me]+14} y1={cy+26} x2={x-12} y2={cy+26} stroke="#22D3EE" strokeWidth="1.6" markerEnd="url(#lcS)" opacity={st.phase===3?1:0.35}/>
          ))}
          {/* Legend */}
          <rect x="15" y="170" width="370" height="45" fill="#0D1525" stroke={C.line}/>
          <text x="22" y="185" fill="#E8A838" fontSize="10" fontFamily="monospace">■ diffusion demande: (n−1)</text>
          <text x="22" y="198" fill="#4ECDC4" fontSize="10" fontFamily="monospace">■ acquittements:      (n−1)</text>
          <text x="22" y="211" fill="#22D3EE" fontSize="10" fontFamily="monospace">■ diffusion sortie:    (n−1)</text>
          <text x="250" y="198" fill="#f1f5f9" fontSize="13" fontFamily="monospace" fontWeight="bold">= 3(n−1)</text>
          {st.done && <text x="250" y="211" fill="#22D3EE" fontSize="10" fontFamily="monospace">total: {st.sent} msgs</text>}
        </svg>
      </AnimContainer>
      <Controls anim={anim} color={color} />
    </div>
  );
}

// ═══════════════════════════════════════════════
// ANIMATION: Ricart-Agrawala explicit-token
// ═══════════════════════════════════════════════
function RATokenAnim({ color }) {
  // Triangle of 3 processes with explicit token array [e1|e2|e3]
  const cx = 200, cy = 100, R = 60;
  const N = 3;
  const pos = Array.from({length:N}, (_,i) => {
    const a = (i * 2 * Math.PI) / N - Math.PI / 2;
    return { x: cx + R * Math.cos(a), y: cy + R * Math.sin(a) };
  });
  const steps = [
    { desc: "In Lamport's algorithm the privilège to enter CS is implicit (smallest timestamp). Ricart & Agrawala make it EXPLICIT via an object called 'jeton' — an array jeton[i] = number of past entries of Pi.", owner: 0, jeton: [0,0,0], demandes: [0,0,0], req: null },
    { desc: "Initial state: jeton = [0 | 0 | 0] held by P1. No pending requests. Array cells all zero. At most one token exists in the whole system (invariant).", owner: 0, jeton: [0,0,0], demandes: [0,0,0], req: null },
    { desc: "P2 wants to enter. It broadcasts (demande, k=5) where 5 = number of P2's past entries + 1 = 'my counter of requests'. P1 and P3 receive it.", owner: 0, jeton: [0,0,0], demandes: [0,5,0], req: {from: 1, k: 5} },
    { desc: "When P1 (token holder) receives the demande: it checks 'is the requester's counter > jeton[j]?' (meaning: does the requester have more pending entries than it already used?). 5 > 0 → yes → P1 sends the token to P2.", owner: 1, jeton: [0,0,0], demandes: [0,5,0], req: null, transfer: true },
    { desc: "P2 receives the token, enters the CS. On exit it increments jeton[2] := jeton[2] + 1 = 1. The token now carries information about P2's cumulative usage.", owner: 1, jeton: [0,1,0], demandes: [0,0,0], req: null, inCS: 1 },
    { desc: "Message complexity: at most 2(n−1) messages per entry (versus 3(n−1) in Lamport). Token makes the release phase implicit: no need to broadcast sortie.", owner: 1, jeton: [0,1,0], demandes: [0,0,0], req: null, done: true },
  ];
  const anim = useAnimation(steps, 1800);
  const s = anim.step, st = steps[s];
  return (
    <div>
      <AnimContainer narration={st.desc} color={color}>
        <svg viewBox="0 0 400 210" style={{ width: "100%", maxHeight: 220 }}>
          {[[0,1],[1,2],[2,0]].map(([i,j],k) => (
            <line key={k} x1={pos[i].x} y1={pos[i].y} x2={pos[j].x} y2={pos[j].y} stroke={C.line} strokeWidth="1" opacity="0.4"/>
          ))}
          {pos.map((p, i) => {
            const hasToken = st.owner === i;
            const isCS = st.inCS === i;
            const col = isCS ? "#22D3EE" : color;
            return (
              <g key={i}>
                <circle cx={p.x} cy={p.y} r="20" fill={hasToken?`${col}40`:"#1e293b"} stroke={col} strokeWidth={hasToken?3:1.8}/>
                <text x={p.x} y={p.y+4} textAnchor="middle" fill={col} fontSize="11" fontWeight="bold" fontFamily="monospace">P{i+1}</text>
                {st.demandes[i] > 0 && <text x={p.x} y={p.y+32} textAnchor="middle" fill="#E8A838" fontSize="9" fontFamily="monospace">dem={st.demandes[i]}</text>}
              </g>
            );
          })}
          {/* Token */}
          {(() => {
            const p = pos[st.owner];
            return (
              <g>
                <rect x={p.x-38} y={p.y-52} width="80" height="28" rx="4" fill="#fbbf24" stroke="#f59e0b" strokeWidth="2">
                  <animate attributeName="opacity" from="0.3" to="1" dur="0.4s"/>
                </rect>
                <text x={p.x} y={p.y-36} textAnchor="middle" fill="#0f172a" fontSize="10" fontFamily="monospace" fontWeight="bold">jeton [{st.jeton.join("|")}]</text>
              </g>
            );
          })()}
          {st.req && (
            <g>
              <text x={pos[st.req.from].x - 10} y={pos[st.req.from].y + 45} fill="#ef4444" fontSize="9" fontFamily="monospace">(demande, {st.req.k})</text>
            </g>
          )}
          {st.transfer && <text x="200" y="185" textAnchor="middle" fill="#22D3EE" fontSize="10" fontFamily="monospace">token transferred P1 → P2</text>}
          {st.done && <text x="200" y="200" textAnchor="middle" fill="#22D3EE" fontSize="11" fontWeight="bold" fontFamily="monospace">2(n−1) messages per entry</text>}
        </svg>
      </AnimContainer>
      <Controls anim={anim} color={color} />
    </div>
  );
}

    { desc: "Space-time diagram of 3 processes. We want a global snapshot: each process records its local state s★ at some point.", cut: false, showMsgs: false, label: null },
    { desc: "Draw a vertical 'cut' at some virtual time. Events to the LEFT are pre-shot, to the RIGHT are post-shot. Our cut separates past and future.", cut: true, showMsgs: false, label: "cut" },
    { desc: "Look at messages crossing the cut. TYPE A (green): send pre-shot, receive pre-shot — harmless. TYPE B (yellow): send pre, receive post — a message in transit (allowed, will be recorded as channel state).", cut: true, showMsgs: true, label: "analyse" },
    { desc: "TYPE C (red): send POST-shot, receive PRE-shot. This would mean the receiver knew about an event that hasn't happened yet → causally impossible.", cut: true, showMsgs: true, label: "bad", highlightBad: true },
    { desc: "Coherent cut = a cut that does NOT contain any red arrow. Formally: the pre-shot set is closed under the happened-before relation → . Every snapshot algorithm must produce a coherent cut.", cut: true, showMsgs: true, label: "coherent", highlightBad: false },
    { desc: "Def: snapshot is POSSIBLE iff ∀p,q: send_{p,q} ⊇ received_{q,p} (no receive without send). SIGNIFICANT iff the recorded configuration C★ is reachable by some execution. Chandy-Lamport produces snapshots that are possible + coherent + significant.", cut: true, showMsgs: true, label: "defs", highlightBad: false },
  ];
  const anim = useAnimation(steps, 1900);
  const s = anim.step, st = steps[s];
  return (
    <div>
      <AnimContainer narration={st.desc} color={color}>
        <svg viewBox="0 0 400 230" style={{ width: "100%", maxHeight: 240 }}>
          <defs>
            <marker id="ccok" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#22D3EE"/></marker>
            <marker id="cccut" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#E8A838"/></marker>
            <marker id="ccbad" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#ef4444"/></marker>
            <marker id="ccpost" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#94a3b8"/></marker>
          </defs>
          {procs.map((p, i) => (
            <g key={i}>
              <text x="15" y={p.y+4} fill={C.text} fontSize="11" fontFamily="monospace">{p.label}</text>
              <line x1="40" y1={p.y} x2="380" y2={p.y} stroke={C.line} strokeWidth="2"/>
            </g>
          ))}
          {events.map((e, i) => (
            <circle key={i} cx={e.x} cy={procs[e.p].y} r="4" fill={e.x < cutX ? color : "#94a3b8"}/>
          ))}
          {/* Cut */}
          {st.cut && (
            <g>
              <line x1={cutX} y1="25" x2={cutX} y2="210" stroke="#4ECDC4" strokeWidth="2.5" strokeDasharray="5"/>
              <text x={cutX-18} y={20} fill="#4ECDC4" fontSize="10" fontFamily="monospace">S★</text>
              <text x={cutX-60} y={222} fill="#22D3EE" fontSize="9" fontFamily="monospace" opacity="0.8">pre-shot</text>
              <text x={cutX+10} y={222} fill="#94a3b8" fontSize="9" fontFamily="monospace" opacity="0.8">post-shot</text>
            </g>
          )}
          {/* Messages */}
          {st.showMsgs && msgs.map((m, k) => {
            let col, marker;
            if (m.type === "ok")      { col = "#22D3EE"; marker = "ccok"; }
            else if (m.type === "cut") { col = "#E8A838"; marker = "cccut"; }
            else if (m.type === "post"){ col = "#94a3b8"; marker = "ccpost"; }
            else                       { col = "#ef4444"; marker = "ccbad"; }
            const isBad = m.type === "bad";
            return <line key={k} x1={m.fx} y1={m.fy+3} x2={m.tx} y2={m.ty-3} stroke={col} strokeWidth="1.8" markerEnd={`url(#${marker})`} strokeDasharray={m.type==="cut"?"0":(isBad?"3":"0")} opacity={(st.highlightBad && !isBad)?0.25:0.9}/>;
          })}
          {/* Hypothetical bad arrow — right-to-left crossing the cut */}
          {st.showMsgs && (
            <g>
              <line x1="260" y1="58" x2="165" y2="172" stroke="#ef4444" strokeWidth="2" strokeDasharray="3" markerEnd="url(#ccbad)" opacity={st.highlightBad ? 1 : 0.35}/>
              <text x="195" y="108" fill="#ef4444" fontSize="9" fontFamily="monospace" opacity={st.highlightBad?1:0.5}>forbidden: post → pre</text>
            </g>
          )}
          {/* Legend */}
          <rect x="10" y="5" width="115" height="42" rx="4" fill="#0D1525" stroke={C.line} opacity={st.showMsgs?1:0}/>
          <text x="16" y="18" fill="#22D3EE" fontSize="8" fontFamily="monospace" opacity={st.showMsgs?1:0}>─ pre → pre</text>
          <text x="16" y="30" fill="#E8A838" fontSize="8" fontFamily="monospace" opacity={st.showMsgs?1:0}>─ pre → post (ok)</text>
          <text x="16" y="42" fill="#ef4444" fontSize="8" fontFamily="monospace" opacity={st.showMsgs?1:0}>─ post → pre (BAD)</text>
        </svg>
      </AnimContainer>
      <Controls anim={anim} color={color} />
    </div>
  );
}

// ═══════════════════════════════════════════════
// ANIMATION: Chandy-Lamport (FIFO channels, marker)
// ═══════════════════════════════════════════════
function ChandyLamportAnim({ color }) {
  // 3 nodes triangle, FIFO channels
  const nodes = [
    {x: 120, y: 55, label: "P1"},
    {x: 300, y: 55, label: "P2"},
    {x: 210, y: 170, label: "P3"},
  ];
  const edges = [[0,1],[1,2],[2,0],[1,0],[2,1],[0,2]];
  const steps = [
    { desc: "Graph with FIFO channels (both directions). Initially no snapshot taken. Application messages flow freely.", taken: [false,false,false], markers: [] },
    { desc: "Layer above triggers snapshot at P1. Rule: P1 records its local state s★₁ and immediately sends a MARKER on every outgoing channel.", taken: [true,false,false], markers: [{from:0,to:1,r:0.2},{from:0,to:2,r:0.2}], recording: 0 },
    { desc: "P2 receives its first marker (from P1). Since taken=false, P2 records s★₂ and sends markers on all its outgoing channels. Channel state 1→2 is empty (no pending app messages before marker thanks to FIFO).", taken: [true,true,false], markers: [{from:1,to:2,r:0.3},{from:1,to:0,r:0.3},{from:0,to:2,r:0.5}], recording: 1, chanState: "ch(1→2)=∅" },
    { desc: "P3 receives marker from P1. It records s★₃ and emits markers on all outgoing channels. All three local states are now frozen.", taken: [true,true,true], markers: [{from:2,to:0,r:0.3},{from:2,to:1,r:0.3},{from:1,to:0,r:0.5}], recording: 2 },
    { desc: "After a snapshot starts, every channel state is measured as the sequence of app messages received between 'marker of that channel has not yet arrived' and 'marker arrived'. FIFO guarantees this set is well-defined.", taken: [true,true,true], markers: [], done: true },
    { desc: "Result: local states s★₁,s★₂,s★₃ + channel states form a COHERENT SNAPSHOT. No global clock needed, no synchronisation — each node acts autonomously on marker receive.", taken: [true,true,true], markers: [], done: true },
  ];
  const anim = useAnimation(steps, 1800);
  const s = anim.step, st = steps[s];
  return (
    <div>
      <AnimContainer narration={st.desc} color={color}>
        <svg viewBox="0 0 400 220" style={{ width: "100%", maxHeight: 240 }}>
          {edges.map((e, i) => {
            const a = nodes[e[0]], b = nodes[e[1]];
            const dx = b.x - a.x, dy = b.y - a.y;
            const len = Math.sqrt(dx*dx+dy*dy);
            // Offset so that two parallel arrows are visible
            const ox = -dy/len*5, oy = dx/len*5;
            return <line key={i} x1={a.x+ox} y1={a.y+oy} x2={b.x+ox} y2={b.y+oy} stroke={C.line} strokeWidth="1.2" opacity="0.5"/>;
          })}
          {nodes.map((n, i) => {
            const recording = st.taken[i];
            return (
              <g key={i}>
                <circle cx={n.x} cy={n.y} r="22" fill={recording ? `${color}40` : "#1e293b"} stroke={color} strokeWidth={recording?3:1.8}/>
                <text x={n.x} y={n.y+4} textAnchor="middle" fill={color} fontSize="11" fontWeight="bold" fontFamily="monospace">{n.label}</text>
                {recording && <text x={n.x} y={n.y-28} textAnchor="middle" fill="#22D3EE" fontSize="9" fontFamily="monospace">s★ saved</text>}
              </g>
            );
          })}
          {/* Markers in flight */}
          {st.markers.map((m, k) => {
            const a = nodes[m.from], b = nodes[m.to];
            const mx = a.x + (b.x - a.x) * m.r;
            const my = a.y + (b.y - a.y) * m.r;
            return (
              <g key={k}>
                <rect x={mx-18} y={my-8} width="32" height="16" rx="3" fill="#E8A838" stroke="#fff" strokeWidth="1">
                  <animate attributeName="opacity" from="0.3" to="1" dur="0.4s"/>
                </rect>
                <text x={mx-2} y={my+4} textAnchor="middle" fill="#0f172a" fontSize="8" fontFamily="monospace" fontWeight="bold">⚑mk</text>
              </g>
            );
          })}
          {st.chanState && <text x="200" y="210" textAnchor="middle" fill="#22D3EE" fontSize="10" fontFamily="monospace">{st.chanState}</text>}
        </svg>
      </AnimContainer>
      <Controls anim={anim} color={color} />
    </div>
  );
}

// ═══════════════════════════════════════════════
// ANIMATION: Lai-Yang (non-FIFO, color piggybacking)
// ═══════════════════════════════════════════════
function LaiYangAnim({ color }) {
  const procs = [{y: 55, label: "P1"}, {y: 115, label: "P2"}, {y: 175, label: "P3"}];
  const steps = [
    { desc: "Lai-Yang handles NON-FIFO channels. Instead of a marker, every application message is tagged with a boolean 'taken'. Initially: taken = false on every process.", taken: [false,false,false], msgs: [{from:0,to:1,x1:60,x2:120,tag:false}] },
    { desc: "P1 decides to take a snapshot: records s★₁, sets taken₁ := true. All FUTURE messages sent by P1 will carry taken = true (i.e. they are post-shot).", taken: [true,false,false], msgs: [{from:0,to:1,x1:60,x2:120,tag:false},{from:0,to:2,x1:150,x2:220,tag:true}] },
    { desc: "P2 receives a message with tag=true and its own taken=false → immediately records s★₂, flips taken₂:=true, THEN handles the message.", taken: [true,true,false], msgs: [{from:0,to:1,x1:60,x2:120,tag:false},{from:0,to:2,x1:150,x2:220,tag:true},{from:1,to:2,x1:245,x2:305,tag:true}] },
    { desc: "P3 receives a tagged message too → records s★₃, flips taken₃:=true. A snapshot is installed across the whole system even without FIFO channels.", taken: [true,true,true], msgs: [{from:0,to:1,x1:60,x2:120,tag:false},{from:0,to:2,x1:150,x2:220,tag:true},{from:1,to:2,x1:245,x2:305,tag:true}], done: true },
    { desc: "Trade-off vs Chandy-Lamport: one extra bit per application message (piggyback), no extra control messages. Works over any (reliable) channel.", taken: [true,true,true], msgs: [{from:0,to:1,x1:60,x2:120,tag:false},{from:0,to:2,x1:150,x2:220,tag:true},{from:1,to:2,x1:245,x2:305,tag:true}], done: true },
  ];
  const anim = useAnimation(steps, 1800);
  const s = anim.step, st = steps[s];
  return (
    <div>
      <AnimContainer narration={st.desc} color={color}>
        <svg viewBox="0 0 400 230" style={{ width: "100%", maxHeight: 240 }}>
          <defs>
            <marker id="lyPre" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#94a3b8"/></marker>
            <marker id="lyPost" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#E8A838"/></marker>
          </defs>
          {procs.map((p, i) => (
            <g key={i}>
              <text x="14" y={p.y+4} fill={st.taken[i]?"#22D3EE":C.text} fontSize="11" fontFamily="monospace">{p.label}</text>
              <line x1="40" y1={p.y} x2="380" y2={p.y} stroke={C.line} strokeWidth="2"/>
              {st.taken[i] && <text x={14} y={p.y+16} fill="#22D3EE" fontSize="8" fontFamily="monospace">taken</text>}
            </g>
          ))}
          {st.msgs.map((m, k) => {
            const fromY = procs[m.from].y, toY = procs[m.to].y;
            const col = m.tag ? "#E8A838" : "#94a3b8";
            const marker = m.tag ? "lyPost" : "lyPre";
            return (
              <g key={k}>
                <line x1={m.x1} y1={fromY+3} x2={m.x2} y2={toY-3} stroke={col} strokeWidth="1.8" markerEnd={`url(#${marker})`}/>
                <text x={(m.x1+m.x2)/2-16} y={(fromY+toY)/2} fill={col} fontSize="8" fontFamily="monospace">tag={m.tag?"T":"F"}</text>
              </g>
            );
          })}
          <rect x="290" y="10" width="100" height="38" rx="4" fill="#0D1525" stroke={C.line}/>
          <text x="296" y="24" fill="#94a3b8" fontSize="8" fontFamily="monospace">─ pre-shot (F)</text>
          <text x="296" y="38" fill="#E8A838" fontSize="8" fontFamily="monospace">─ post-shot (T)</text>
          {st.done && <text x="200" y="215" textAnchor="middle" fill="#22D3EE" fontSize="11" fontWeight="bold" fontFamily="monospace">snapshot complete — 1 bit / msg</text>}
        </svg>
      </AnimContainer>
      <Controls anim={anim} color={color} />
    </div>
  );
}

// ═══════════════════════════════════════════════
// ANIMATION: Safra (Async termination with counters)
// ═══════════════════════════════════════════════
function SafraCountersAnim({ color }) {
  const N = 4;
  const cx = 190, cy = 110, R = 70;
  const pos = Array.from({length:N}, (_,i) => {
    const a = (i * 2 * Math.PI) / N - Math.PI / 2;
    return { x: cx + R * Math.cos(a), y: cy + R * Math.sin(a) };
  });
  const steps = [
    { desc: "Safra extends Dijkstra to asynchronous channels. Each process keeps me = (msgs sent) − (msgs received). The token carries c (color) and q (running sum of me).", me: [0,0,0,0], tokenAt: 0, q: 0, color_: "white", colors: ["white","white","white","white"], passive: [true,true,true,true] },
    { desc: "P0 sends a work message to P2. P0.me = 0+1 = 1. The message is still in transit → Σ me = 1 ≠ 0 will detect it.", me: [1,0,0,0], tokenAt: 0, q: 0, color_: "white", colors: ["white","white","white","white"], passive: [true,false,true,true], msg: {from:0,to:2} },
    { desc: "P2 receives the message: me = 0-1 = -1 and colour turns BLACK (rule R3 of Dijkstra). P2 is now ACTIVE.", me: [1,0,-1,0], tokenAt: 0, q: 0, color_: "white", colors: ["white","white","black","white"], passive: [true,false,false,true] },
    { desc: "P2 finishes its work and becomes passive. P0 launches the token: envoyer(tok, white, 0) → P3 (suivant on the ring).", me: [1,0,-1,0], tokenAt: 3, q: 0, color_: "white", colors: ["white","white","black","white"], passive: [true,true,true,true] },
    { desc: "P3 passive, colour white: relays (tok, white, q + me) = (tok, white, 0+0) → P2. q = 0.", me: [1,0,-1,0], tokenAt: 2, q: 0, color_: "white", colors: ["white","white","black","white"], passive: [true,true,true,true] },
    { desc: "P2 is BLACK: taints the token. envoyer(tok, black, q+me) = (tok, black, 0+(-1)). Resets its own colour to white.", me: [1,0,-1,0], tokenAt: 1, q: -1, color_: "black", colors: ["white","white","white","white"], passive: [true,true,true,true] },
    { desc: "P1 relays: (tok, black, -1 + 0) = (tok, black, -1) → P0.", me: [1,0,-1,0], tokenAt: 0, q: -1, color_: "black", colors: ["white","white","white","white"], passive: [true,true,true,true] },
    { desc: "Token returns to P0 BLACK → contaminated round, restart.", me: [1,0,-1,0], tokenAt: 0, q: -1, color_: "black", colors: ["white","white","white","white"], passive: [true,true,true,true], restart: true },
    { desc: "Second round, all white: after full tour, q = me[0]+me[1]+me[2]+me[3] = 1+0+(-1)+0 = 0. Combined with 'token white' and 'P0 white/passive' → TERMINATION ANNOUNCED.", me: [1,0,-1,0], tokenAt: 0, q: 0, color_: "white", colors: ["white","white","white","white"], passive: [true,true,true,true], done: true },
  ];
  const anim = useAnimation(steps, 1700);
  const s = anim.step, st = steps[s];
  return (
    <div>
      <AnimContainer narration={st.desc} color={color}>
        <svg viewBox="0 0 400 230" style={{ width: "100%", maxHeight: 240 }}>
          <circle cx={cx} cy={cy} r={R} fill="none" stroke={C.line} strokeWidth="1" strokeDasharray="3" opacity="0.3"/>
          {pos.map((p, i) => {
            const pc = st.colors[i] === "black" ? "#1e293b" : `${color}25`;
            const border = st.colors[i] === "black" ? "#f1f5f9" : color;
            return (
              <g key={i}>
                <circle cx={p.x} cy={p.y} r="18" fill={pc} stroke={border} strokeWidth="2"/>
                <text x={p.x} y={p.y+4} textAnchor="middle" fill={st.colors[i]==="black"?"#fff":color} fontSize="11" fontWeight="bold" fontFamily="monospace">P{i}</text>
                <text x={p.x+22} y={p.y-8} fill={st.me[i]===0?"#94a3b8":"#22D3EE"} fontSize="9" fontFamily="monospace">me={st.me[i]}</text>
                <text x={p.x+22} y={p.y+8} fill={st.passive[i]?"#94a3b8":"#E8A838"} fontSize="8" fontFamily="monospace">{st.passive[i]?"passive":"ACTIVE"}</text>
              </g>
            );
          })}
          {/* Work message */}
          {st.msg && (() => {
            const a = pos[st.msg.from], b = pos[st.msg.to];
            return <line x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke="#ef4444" strokeWidth="2" strokeDasharray="4" markerEnd="url(#ca)"/>;
          })()}
          {/* Token */}
          {(() => {
            const p = pos[st.tokenAt];
            const tc = st.color_ === "white" ? "#fff" : "#1e293b";
            const ts = st.color_ === "white" ? color : "#f1f5f9";
            return (
              <g>
                <rect x={p.x-40} y={p.y+24} width="38" height="18" rx="3" fill={tc} stroke={ts} strokeWidth="2"/>
                <text x={p.x-35} y={p.y+36} fill={st.color_==="white"?"#0f172a":"#fff"} fontSize="9" fontFamily="monospace" fontWeight="bold">tok q={st.q}</text>
              </g>
            );
          })()}
          <rect x="305" y="12" width="90" height="68" rx="4" fill="#0D1525" stroke={C.line}/>
          <text x="312" y="26" fill={color} fontSize="9" fontFamily="monospace" fontWeight="bold">termination</text>
          <text x="312" y="40" fill="#94a3b8" fontSize="8" fontFamily="monospace">iff tok=white</text>
          <text x="312" y="52" fill="#94a3b8" fontSize="8" fontFamily="monospace">  ∧ P0=white</text>
          <text x="312" y="64" fill="#94a3b8" fontSize="8" fontFamily="monospace">  ∧ me+q = 0</text>
          {st.restart && <text x={cx} y={215} textAnchor="middle" fill="#ef4444" fontSize="11" fontFamily="monospace">↻ tainted → restart</text>}
          {st.done && <text x={cx} y={215} textAnchor="middle" fill="#22D3EE" fontSize="12" fontWeight="bold" fontFamily="monospace">★ ANNOUNCE TERMINATION</text>}
        </svg>
      </AnimContainer>
      <Controls anim={anim} color={color} />
    </div>
  );
}

// ═══════════════════════════════════════════════
// ANIMATION: Mattern Credit (diffusing computation)
// ═══════════════════════════════════════════════
function MatternCreditAnim({ color }) {
  const cx = 200, cy = 125;
  const leader = {x: cx, y: cy};
  const workers = [
    {x: cx-95, y: cy-55}, {x: cx-95, y: cy+55},
    {x: cx+95, y: cy-55}, {x: cx+95, y: cy+55},
  ];
  const steps = [
    { desc: "Star topology. The leader (P0) starts with crédit = 1. All others are passive with crédit = 0. Invariant: sum of credits (processes + messages) = 1.", credit: [1, 0, 0, 0, 0], ret: 0 },
    { desc: "Leader sends work to P1. Piggyback credit/2 = 1/2 on the message; keep 1/2 for itself. P1 will become active on reception.", credit: [0.5, 0, 0, 0, 0], ret: 0, flying: [{to:1, c: 0.5}] },
    { desc: "P1 receives (msg, 1/2). Its crédit := 0 + 1/2 = 1/2. P1 becomes ACTIVE.", credit: [0.5, 0.5, 0, 0, 0], ret: 0, active:[false,true,false,false,false] },
    { desc: "P1 does its computation, becomes PASSIVE. It returns its credit to the leader as a 'ret' message: envoyer(ret, 1/2) to P0; local credit := 0.", credit: [0.5, 0, 0, 0, 0], ret: 0, flying: [{to: 0, c: 0.5, ret: true}] },
    { desc: "Leader receives ret(1/2). Accumulator: ret := 0 + 1/2 = 1/2. But ret ≠ 1, so application not yet terminated (or: leader itself still has credit 1/2).", credit: [0.5, 0, 0, 0, 0], ret: 0.5 },
    { desc: "Leader now also becomes passive: sends its remaining 1/2 credit back as ret message to itself → ret := 1/2 + 1/2 = 1.", credit: [0, 0, 0, 0, 0], ret: 1, done: true },
    { desc: "ret = 1 ⇒ all credits have come home ⇒ no active process, no message in transit ⇒ ANNOUNCE TERMINATION. Works over arbitrary graphs / async channels.", credit: [0, 0, 0, 0, 0], ret: 1, done: true },
  ];
  const anim = useAnimation(steps, 1700);
  const s = anim.step, st = steps[s];
  const nodes = [leader, ...workers];
  return (
    <div>
      <AnimContainer narration={st.desc} color={color}>
        <svg viewBox="0 0 400 250" style={{ width: "100%", maxHeight: 250 }}>
          {workers.map((w, i) => (
            <line key={i} x1={leader.x} y1={leader.y} x2={w.x} y2={w.y} stroke={C.line} strokeWidth="1" opacity="0.5"/>
          ))}
          {nodes.map((n, i) => {
            const isLeader = i === 0;
            const isActive = st.active && st.active[i];
            const col = isLeader ? color : (isActive ? "#E8A838" : "#4ECDC4");
            return (
              <g key={i}>
                <circle cx={n.x} cy={n.y} r="20" fill={isLeader?`${col}40`:`${col}25`} stroke={col} strokeWidth="2"/>
                <text x={n.x} y={n.y-2} textAnchor="middle" fill={col} fontSize="10" fontWeight="bold" fontFamily="monospace">P{i}</text>
                <text x={n.x} y={n.y+10} textAnchor="middle" fill="#f1f5f9" fontSize="9" fontFamily="monospace">c={st.credit[i]}</text>

          <text x="18" y="25" fill={color} fontSize="9" fontFamily="monospace" fontWeight="bold">invariant</text>
          <text x="18" y="39" fill="#94a3b8" fontSize="8" fontFamily="monospace">Σ credits = 1</text>
          <text x="18" y="51" fill="#94a3b8" fontSize="8" fontFamily="monospace">active ⇒ c&gt;0</text>
          <text x="18" y="63" fill="#94a3b8" fontSize="8" fontFamily="monospace">msg    ⇒ c&gt;0</text>
          {st.done && <text x={cx} y={235} textAnchor="middle" fill="#22D3EE" fontSize="12" fontWeight="bold" fontFamily="monospace">★ ret = 1 → TERMINATED</text>}

      </AnimContainer>
      <Controls anim={anim} color={color} />
    </div>
  );
}

// ANIMATION: Chang-Roberts (Leader Election, unidirectional ring)

function ChangRobertsAnim({ color }) {
  // 6 processes, IDs chosen to showcase min propagation
  const ids = [53, 22, 77, 1024, 96, 101];

  });
  // steps: each describes ring state (participant flags, current msg in flight)
  const steps = [
    { desc: "Oriented ring of 6 processes (clockwise). Each has a unique ID. None is participant yet.", parts: [0,0,0,0,0,0], msgs: [] },
    { desc: "All wake up: each sends (+, mon_numero) to its successor. 6 messages in flight.", parts: [1,1,1,1,1,1], msgs: ids.map((v,i) => ({from:i, val:v})) },
    { desc: "Rule on reception: if val < mon_numero, forward val. If val > mon_numero, swallow (drop). If val = mon_numero → I am leader.", parts: [1,1,1,1,1,1], msgs: [{from:0,val:53},{from:1,val:22},{from:2,val:77},{from:3,val:1024},{from:4,val:96},{from:5,val:101}] },
    { desc: "P0(id=53) receives 101 from P5 → 101>53, DROPPED. P1(id=22) receives 53 from P0 → 53>22, DROPPED. Only smaller IDs survive.", parts: [1,1,1,1,1,1], msgs: [{from:1,val:22},{from:2,val:77,dying:true},{from:3,val:1024,dying:true},{from:4,val:96,dying:true}] },
    { desc: "After extinction of large IDs, the message carrying 22 (the minimum) keeps circulating. Others are gone.", parts: [1,1,1,1,1,1], msgs: [{from:2,val:22}] },
    { desc: "22 keeps progressing around the ring: P3 sees 22 < 1024 → forward. P4 sees 22 < 96 → forward. P5 sees 22 < 101 → forward.", parts: [1,1,1,1,1,1], msgs: [{from:5,val:22}] },
    { desc: "22 returns to its origin (P1). val = mon_numero → P1 declares itself LEADER. Protocol terminates.", parts: [1,1,1,1,1,1], msgs: [], leader: 1 },
  ];
  const anim = useAnimation(steps, 1600);
  const s = anim.step, st = steps[s];
  return (
    <div>
      <AnimContainer narration={st.desc} color={color}>
        <svg viewBox="0 0 400 240" style={{ width: "100%", maxHeight: 260 }}>
          {/* Ring arrows */}
          {pos.map((p, i) => {
            const q = pos[(i+1) % N];
            return <line key={i} x1={p.x} y1={p.y} x2={q.x} y2={q.y} stroke={C.line} strokeWidth="1.5" strokeDasharray="3" opacity="0.5"/>;
          })}
          {/* Nodes */}
          {pos.map((p, i) => {
            const isLeader = st.leader === i;
            const isMin = ids[i] === minId;
            const nodeColor = isLeader ? "#22D3EE" : (isMin ? color : `${color}99`);
            return (
              <g key={i}>
                <circle cx={p.x} cy={p.y} r="20" fill={isLeader ? `${nodeColor}40` : "#1e293b"} stroke={nodeColor} strokeWidth={isLeader ? 3 : 2}/>
                <text x={p.x} y={p.y+4} textAnchor="middle" fill={nodeColor} fontSize="11" fontWeight="bold" fontFamily="monospace">{ids[i]}</text>
                {isLeader && <text x={p.x} y={p.y-28} textAnchor="middle" fill="#22D3EE" fontSize="10" fontFamily="monospace">★ LEADER</text>}
                {isMin && !isLeader && <text x={p.x} y={p.y-28} textAnchor="middle" fill={color} fontSize="9" fontFamily="monospace">min</text>}
              </g>
            );
          })}
          {/* Messages in flight */}
          {st.msgs.map((m, k) => {
            const a = pos[m.from], b = pos[(m.from+1)%N];
            const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
            const col = m.dying ? "#ef4444" : (m.val === minId ? "#22D3EE" : color);
            return (
              <g key={k}>
                <circle cx={mx} cy={my} r="11" fill={col} opacity={m.dying ? 0.4 : 0.9}>
                  {!m.dying && <animate attributeName="r" from="6" to="11" dur="0.3s"/>}
                </circle>
                <text x={mx} y={my+3} textAnchor="middle" fill="#fff" fontSize="9" fontWeight="bold" fontFamily="monospace">{m.val}</text>
                {m.dying && <text x={mx+14} y={my+3} fill="#ef4444" fontSize="9" fontFamily="monospace">✗</text>}

          {/* Rule box */}
          <rect x="300" y="10" width="95" height="62" rx="4" fill="#0D1525" stroke={C.line} strokeWidth="1"/>

          <text x="307" y="37" fill="#22D3EE" fontSize="8" fontFamily="monospace">v &lt; me → fwd</text>
          <text x="307" y="49" fill="#ef4444" fontSize="8" fontFamily="monospace">v &gt; me → drop</text>
          <text x="307" y="61" fill="#f1f5f9" fontSize="8" fontFamily="monospace">v = me → LEAD</text>
        </svg>
      </AnimContainer>
      <Controls anim={anim} color={color} />
    </div>
  );
}

// ANIMATION: Peterson Election (bidirectional, O(n log n))
// ═══════════════════════════════════════════════
function PetersonElectionAnim({ color }) {
  // 8 processes with IDs; highlight which die each phase
  const N = 8;
  const ids = [19, 54, 45, 15, 22, 67, 36, 34];
  const minId = Math.min(...ids);
  const cx = 200, cy = 130, R = 95;
  const pos = ids.map((_, i) => {
    const a = (i * 2 * Math.PI) / N - Math.PI / 2;
    return { x: cx + R * Math.cos(a), y: cy + R * Math.sin(a) };
  });
  // Peterson phase: each survivor receives from one side; if received value < own → becomes victim.
  // Round robin: phase1 dir=+, phase2 dir=-, etc. After each pair of phases, survivors halve.
  const steps = [
    { desc: "Bidirectional ring, 8 alive processes. Peterson alternates directions (+/−) in phases. Victims receive a value strictly smaller than theirs; survivors relay.", alive: [1,1,1,1,1,1,1,1], phase: 0 },
    { desc: "Phase 1 (+): each sends own numero to right neighbour. A process receiving a value < own becomes VICTIM. Victims stop competing — they only relay.", alive: [1,1,1,1,1,1,1,1], phase: 1, victims: [1,3,5,7] },
    { desc: "Phase 2 (−): survivors send own numero in the opposite direction. Again, recipients of smaller values become victims. Key lemma: every 2 phases the number of survivors is halved.", alive: [1,0,1,0,1,0,1,0], phase: 2, victims: [4,6] },
    { desc: "After 2 phases: 4 survivors remain. Continue alternating directions.", alive: [1,0,0,0,1,0,1,0], phase: 3 },
    { desc: "Phase 3+4: again halved → 2 survivors.", alive: [1,0,0,0,1,0,0,0], phase: 4 },
    { desc: "Phase 5: only 2 alive. One more halving → 1 survivor.", alive: [1,0,0,0,0,0,0,0], phase: 5 },
    { desc: "A process receives its own numero back → declares itself LEADER. Complexity: O(log n) phases × O(n) msgs = O(n log n).", alive: [1,0,0,0,0,0,0,0], phase: 6, leader: 0 },
  ];
  const anim = useAnimation(steps, 1600);
  const s = anim.step, st = steps[s];
  return (
    <div>
      <AnimContainer narration={st.desc} color={color}>
        <svg viewBox="0 0 400 280" style={{ width: "100%", maxHeight: 280 }}>
          <circle cx={cx} cy={cy} r={R} fill="none" stroke={C.line} strokeWidth="1.5" strokeDasharray="3" opacity="0.4"/>
          {pos.map((p, i) => {
            const alive = st.alive[i];
            const isLeader = st.leader === i;
            const col = isLeader ? "#22D3EE" : (alive ? color : "#475569");
            return (
              <g key={i}>
                <circle cx={p.x} cy={p.y} r={alive?18:14} fill={alive?`${col}30`:"#1e293b"} stroke={col} strokeWidth={isLeader?3:1.8} opacity={alive?1:0.5}/>
                <text x={p.x} y={p.y+4} textAnchor="middle" fill={col} fontSize="10" fontWeight={alive?"bold":"normal"} fontFamily="monospace">{ids[i]}</text>
                {!alive && <text x={p.x} y={p.y+4} textAnchor="middle" fill="#ef4444" fontSize="14" opacity="0.5">✗</text>}
                {isLeader && <text x={p.x} y={p.y-26} textAnchor="middle" fill="#22D3EE" fontSize="10" fontFamily="monospace">★ LEADER</text>}
              </g>
            );
          })}
          {/* Stats box */}
          <rect x="10" y="10" width="110" height="48" rx="4" fill="#0D1525" stroke={C.line}/>
          <text x="18" y="25" fill={color} fontSize="9" fontFamily="monospace" fontWeight="bold">phase {st.phase}</text>
          <text x="18" y="40" fill="#f1f5f9" fontSize="9" fontFamily="monospace">alive: {st.alive.filter(x=>x).length}/8</text>
          <text x="18" y="52" fill="#94a3b8" fontSize="9" fontFamily="monospace">dir: {st.phase%2===1?"+":"−"}</text>
        </svg>
      </AnimContainer>
      <Controls anim={anim} color={color} />
    </div>
  );
}

// ─── Exercise Block (collapsible solution) ───
function ExerciseBlock({ q, a, color, keyId }) {
  const [open, setOpen] = useState(false);
  // Reset whenever the subtopic changes
  useEffect(() => { setOpen(false); }, [keyId]);
  return (
    <div style={{ border: `1px solid ${color}33`, borderRadius: 8, overflow: "hidden" }}>
      <div style={{ padding: "14px 18px", background: `${color}10` }}>
        <div style={{ fontSize: 11, color, fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1, marginBottom: 6 }}>QUESTION</div>
        <p style={{ margin: 0, color: "#e2e8f0" }}>{q}</p>
      </div>
      <button onClick={() => setOpen(!open)} style={{ display: "block", width: "100%", padding: "8px 18px", textAlign: "left", background: "#111827", border: "none", borderTop: `1px solid ${color}22`, color: open ? color : "#94a3b8", cursor: "pointer", fontSize: 12, fontFamily: "'JetBrains Mono', monospace", transition: "all 0.2s" }}>
        {open ? "▼ Hide solution" : "▶ Show solution"}
      </button>
      {open && (
        <div style={{ padding: "14px 18px", background: "#0B1121", borderTop: `1px solid ${color}22` }}>
          <div style={{ fontSize: 11, color: "#4ECDC4", fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1, marginBottom: 6 }}>SOLUTION</div>
          <p style={{ margin: 0, color: "#cbd5e1", lineHeight: 1.7 }}>{a}</p>
        </div>
      )}
    </div>
  );
}

}

          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <button onClick={() => activeSubtopic > 0 && setActiveSubtopic(activeSubtopic - 1)} disabled={activeSubtopic === 0} style={{ background: "#1e293b", border: "none", color: activeSubtopic === 0 ? "#334155" : "#94a3b8", cursor: activeSubtopic === 0 ? "default" : "pointer", padding: "5px 12px", borderRadius: 4, fontSize: 12, fontFamily: "monospace" }}>← Prev</button>
            <button onClick={() => pillar && activeSubtopic < pillar.subtopics.length - 1 && setActiveSubtopic(activeSubtopic + 1)} disabled={!pillar || activeSubtopic >= pillar.subtopics.length - 1} style={{ background: "#1e293b", border: "none", color: (!pillar || activeSubtopic >= pillar.subtopics.length - 1) ? "#334155" : "#94a3b8", cursor: (!pillar || activeSubtopic >= pillar.subtopics.length - 1) ? "default" : "pointer", padding: "5px 12px", borderRadius: 4, fontSize: 12, fontFamily: "monospace" }}>Next →</button>
            <button onClick={toggleStudied} style={{ background: studied[studiedKey] ? "#22D3EE20" : "#1e293b", border: studied[studiedKey] ? "1px solid #22D3EE" : "1px solid #334155", color: studied[studiedKey] ? "#22D3EE" : "#94a3b8", cursor: "pointer", padding: "5px 14px", borderRadius: 4, fontSize: 12, fontFamily: "monospace", transition: "all 0.2s" }}>{studied[studiedKey] ? "✓ Studied" : "Mark studied"}</button>
          </div>
        </div>

        <div style={{ flex: 1, overflowY: "auto", padding: "28px 36px" }}>
          {subtopic && (
            <div style={{ maxWidth: 800 }}>
              <h2 style={{ margin: "0 0 8px", fontSize: 26, fontWeight: 700, color: pillar.color, fontFamily: "'JetBrains Mono', monospace" }}>{subtopic.title}</h2>
              <p style={{ margin: "0 0 28px", fontSize: 13, color: "#64748b", fontFamily: "monospace" }}>{pillar.title} — Subtopic {activeSubtopic + 1} of {pillar.subtopics.length}</p>

              <Section title="Definition" icon="📖" color={pillar.color}>
                <p style={{ margin: 0 }}>{subtopic.definition}</p>
              </Section>

              <Section title="Intuition" icon="💡" color={pillar.color}>
                <div style={{ background: `${pillar.color}08`, border: `1px solid ${pillar.color}25`, borderRadius: 8, padding: "14px 18px" }}>
                  <p style={{ margin: 0, fontStyle: "italic", color: "#e2e8f0" }}>{subtopic.intuition}</p>
                </div>
              </Section>

              <Section title="Interactive Animation" icon="🎬" color={pillar.color}>
                {AnimComponent ? <AnimComponent color={pillar.color} key={`${activePillar}-${activeSubtopic}`} /> : <p>Animation not available</p>}
              </Section>

              <Section title="Example" icon="🧪" color={pillar.color}>
                <div style={{ background: "#111827", borderLeft: `3px solid ${pillar.color}`, borderRadius: "0 6px 6px 0", padding: "14px 18px", fontFamily: "'JetBrains Mono', monospace", fontSize: 12.5, lineHeight: 1.8, color: "#d1d5db" }}>
                  {subtopic.example}
                </div>
              </Section>

              {subtopic.complexity && (
                <Section title="Complexity" icon="📊" color={pillar.color}>
                  <div style={{ display: "inline-block", background: "#1e293b", borderRadius: 6, padding: "10px 18px", fontFamily: "'JetBrains Mono', monospace", fontSize: 13, color: "#22D3EE" }}>
                    {subtopic.complexity}
                  </div>
                </Section>
              )}

              {subtopic.exercise && (
                <Section title="Exercise" icon="🧠" color={pillar.color}>
                  <ExerciseBlock q={subtopic.exercise.q} a={subtopic.exercise.a} color={pillar.color} keyId={studiedKey}/>
                </Section>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
