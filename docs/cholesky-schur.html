<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cholesky: Block Multiplication</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f4;
  --surface: #f2ede4;
  --border: #d8cfc0;
  --ink: #1a1612;
  --ink-mid: #5a5248;
  --ink-dim: #9a9088;

  --c-a11: #c0392b;
  --c-a12: #2980b9;
  --c-a21: #27ae60;
  --c-a22: #8e44ad;

  --c-l11: #c0392b;
  --c-l21: #27ae60;
  --c-l22: #8e44ad;

  --c-schur: #e67e22;
  --c-highlight: #f39c12;

  --shadow: rgba(26,22,18,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Crimson Pro', serif;
  min-height: 100vh;
  padding: 2.5rem 2rem;
}

.container { max-width: 900px; margin: 0 auto; }

h1 {
  font-size: 1.9rem;
  font-weight: 300;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin-bottom: 0.2rem;
}

.subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--ink-dim);
  margin-bottom: 2.5rem;
  letter-spacing: 0.06em;
}

/* Step nav */
.steps-nav {
  display: flex;
  gap: 0;
  margin-bottom: 2rem;
  border: 1px solid var(--border);
  overflow: hidden;
  width: fit-content;
}

.step-btn {
  background: var(--bg);
  border: none;
  border-right: 1px solid var(--border);
  color: var(--ink-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  padding: 0.45rem 1rem;
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.03em;
}
.step-btn:last-child { border-right: none; }
.step-btn:hover { background: var(--surface); color: var(--ink); }
.step-btn.active { background: var(--ink); color: var(--bg); }

/* Explanation card */
.explanation {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--ink);
  padding: 1rem 1.25rem;
  margin-bottom: 2rem;
  font-size: 1.05rem;
  line-height: 1.65;
  color: var(--ink-mid);
}
.explanation strong { color: var(--ink); font-weight: 600; }

/* The big visual area */
.visual {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  flex-wrap: wrap;
  margin-bottom: 2rem;
  padding: 2rem;
  background: white;
  border: 1px solid var(--border);
  box-shadow: 0 2px 12px var(--shadow);
  min-height: 220px;
}

/* Block matrix */
.bmatrix {
  display: inline-flex;
  flex-direction: column;
  position: relative;
  gap: 4px;
}

.bmatrix::before, .bmatrix::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  width: 8px;
}
.bmatrix::before {
  left: -10px;
  border-left: 2px solid var(--ink);
  border-top: 2px solid var(--ink);
  border-bottom: 2px solid var(--ink);
}
.bmatrix::after {
  right: -10px;
  border-right: 2px solid var(--ink);
  border-top: 2px solid var(--ink);
  border-bottom: 2px solid var(--ink);
}

.brow { display: flex; gap: 4px; }

.block {
  width: 70px; height: 56px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  border: 1.5px solid transparent;
  transition: all 0.35s ease;
  position: relative;
  font-style: italic;
  color: var(--ink-mid);
}

.block.b-a11 { color: var(--c-a11); border-color: rgba(192,57,43,0.2); background: rgba(192,57,43,0.05); }
.block.b-a12 { color: var(--c-a12); border-color: rgba(41,128,185,0.2); background: rgba(41,128,185,0.05); }
.block.b-a21 { color: var(--c-a21); border-color: rgba(39,174,96,0.2); background: rgba(39,174,96,0.05); }
.block.b-a22 { color: var(--c-a22); border-color: rgba(142,68,173,0.2); background: rgba(142,68,173,0.05); }
.block.b-l11 { color: var(--c-l11); border-color: rgba(192,57,43,0.2); background: rgba(192,57,43,0.05); }
.block.b-l21 { color: var(--c-a21); border-color: rgba(39,174,96,0.2); background: rgba(39,174,96,0.05); }
.block.b-l22 { color: var(--c-l22); border-color: rgba(142,68,173,0.2); background: rgba(142,68,173,0.05); }
.block.b-zero { color: var(--ink-dim); background: rgba(0,0,0,0.02); border-color: transparent; font-style: normal; }
.block.b-schur { color: var(--c-schur); border-color: rgba(230,126,34,0.3); background: rgba(230,126,34,0.08); }
.block.b-active { animation: glow 1.1s ease-in-out infinite; }

@keyframes glow {
  0%,100% { box-shadow: 0 0 0 0 rgba(243,156,18,0.4); }
  50% { box-shadow: 0 0 0 5px rgba(243,156,18,0); }
}

.op-sign {
  font-family: 'Crimson Pro', serif;
  font-size: 1.6rem;
  color: var(--ink-dim);
  font-weight: 300;
  line-height: 1;
  align-self: center;
}

.matrix-label-above {
  font-family: 'Crimson Pro', serif;
  font-size: 0.85rem;
  font-style: italic;
  color: var(--ink-dim);
  text-align: center;
  margin-bottom: 6px;
  letter-spacing: 0.03em;
}

/* Derivation steps */
.derivation {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 1.25rem 1.5rem;
  margin-bottom: 2rem;
}

.deriv-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.63rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-dim);
  margin-bottom: 0.75rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.5rem;
}

.deriv-line {
  font-size: 1.05rem;
  line-height: 2;
  color: var(--ink-mid);
  display: flex;
  align-items: baseline;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.deriv-line + .deriv-line {
  border-top: 1px dashed var(--border);
  padding-top: 0.2rem;
}

.eq-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--ink-dim);
  min-width: 60px;
  letter-spacing: 0.03em;
}

.t { color: var(--ink); font-style: italic; }
.t-a11 { color: var(--c-a11); font-style: italic; font-weight: 600; }
.t-a12 { color: var(--c-a12); font-style: italic; font-weight: 600; }
.t-a21 { color: var(--c-a21); font-style: italic; font-weight: 600; }
.t-a22 { color: var(--c-a22); font-style: italic; font-weight: 600; }
.t-l11 { color: var(--c-l11); font-style: italic; font-weight: 600; }
.t-l21 { color: var(--c-a21); font-style: italic; font-weight: 600; }
.t-l22 { color: var(--c-l22); font-style: italic; font-weight: 600; }
.t-schur { color: var(--c-schur); font-style: italic; font-weight: 600; }
.t-zero { color: var(--ink-dim); }

/* Nav */
.nav-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 1.5rem;
}

.nav-btn {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--ink-mid);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  padding: 0.55rem 1.3rem;
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.04em;
}
.nav-btn:hover:not(:disabled) { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.step-counter {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--ink-dim);
  letter-spacing: 0.08em;
}

/* Transition label inside visual */
.transition-arrow {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: var(--ink-dim);
}
.arrow-line {
  font-size: 1.4rem;
  line-height: 1;
}
.arrow-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.06em;
  color: var(--ink-dim);
}
</style>
</head>
<body>
<div class="container">
  <h1>Why A′ = A₂₂ − L₂₁L₂₁*</h1>
  <h2>Yehor Korotenko</h2>
  <p class="subtitle">block multiplication · cholesky schur complement</p>

  <div class="steps-nav" id="stepsNav"></div>

  <div class="explanation" id="explanation"></div>

  <div class="visual" id="visual"></div>

  <div class="derivation" id="derivation"></div>

  <div class="nav-row">
    <button class="nav-btn" id="prevBtn" onclick="go(-1)">← prev</button>
    <span class="step-counter" id="counter"></span>
    <button class="nav-btn" id="nextBtn" onclick="go(1)">next →</button>
  </div>
</div>

<script>
function block(label, cls, active) {
  return `<div class="block ${cls}${active?' b-active':''}">${label}</div>`;
}
function zero() { return block('0','b-zero',false); }

function bmatrix(rows, labelAbove) {
  const rowsHtml = rows.map(r => `<div class="brow">${r.join('')}</div>`).join('');
  return `<div style="display:inline-flex;flex-direction:column;align-items:center">
    ${labelAbove ? `<div class="matrix-label-above">${labelAbove}</div>` : ''}
    <div class="bmatrix">${rowsHtml}</div>
  </div>`;
}

function opsign(s) { return `<div class="op-sign">${s}</div>`; }

const steps = [
  {
    nav: "Setup",
    explanation: `We want to factor <strong>A = LL*</strong>. Both A and L are written in <strong>block form</strong>: a scalar top-left, a column vector, and a submatrix. Identifying what each block of LL* equals gives us all the Cholesky equations at once.`,
    visual: () => {
      const A = bmatrix([
        [block('a<sub>11</sub>','b-a11'), block('A<sub>12</sub>','b-a12')],
        [block('A<sub>21</sub>','b-a21'), block('A<sub>22</sub>','b-a22')]
      ], 'A');
      const L = bmatrix([
        [block('l<sub>11</sub>','b-l11'), zero()],
        [block('L<sub>21</sub>','b-l21'), block('L<sub>22</sub>','b-l22')]
      ], 'L');
      const Ls = bmatrix([
        [block('l̄<sub>11</sub>','b-l11'), block('L<sub>21</sub>*','b-l21')],
        [zero(), block('L<sub>22</sub>*','b-l22')]
      ], 'L*');
      return A + opsign('=') + L + opsign('·') + Ls;
    },
    derivation: `<div class="deriv-title">block structure</div>
      <div class="deriv-line"><span class="eq-label">A ∈ ℂᴺˣᴺ :</span>
        <span class="t-a11">a₁₁</span> <span class="t"> scalar,</span>
        <span class="t-a12"> A₁₂</span> <span class="t"> = (1×(N−1)) row,</span>
        <span class="t-a21"> A₂₁</span> <span class="t"> = ((N−1)×1) column,</span>
        <span class="t-a22"> A₂₂</span> <span class="t"> = (N−1)×(N−1) matrix</span>
      </div>
      <div class="deriv-line"><span class="eq-label">L lower :</span>
        <span class="t-l11">l₁₁</span> <span class="t"> scalar (top-left),</span>
        <span class="t-zero"> 0 </span><span class="t"> in top-right,</span>
        <span class="t-l21"> L₂₁</span><span class="t"> column,</span>
        <span class="t-l22"> L₂₂</span><span class="t"> lower triangular</span>
      </div>`
  },
  {
    nav: "LL* expanded",
    explanation: `Multiply L and L* as block matrices. Each block of the product is a sum of block products — exactly like ordinary matrix multiplication but with blocks as entries.`,
    visual: () => {
      const prod = bmatrix([
        [
          `<div class="block" style="width:130px;color:var(--c-l11);border-color:rgba(192,57,43,0.2);background:rgba(192,57,43,0.05);font-size:0.72rem">l<sub>11</sub>·l̄<sub>11</sub> + 0·0</div>`,
          `<div class="block" style="width:130px;color:var(--c-a12);border-color:rgba(41,128,185,0.15);background:rgba(41,128,185,0.04);font-size:0.72rem">l<sub>11</sub>·L<sub>21</sub>* + 0·L<sub>22</sub>*</div>`
        ],
        [
          `<div class="block" style="width:130px;color:var(--c-a21);border-color:rgba(39,174,96,0.15);background:rgba(39,174,96,0.04);font-size:0.72rem">L<sub>21</sub>·l̄<sub>11</sub> + L<sub>22</sub>·0</div>`,
          `<div class="block" style="width:130px;color:var(--c-a22);border-color:rgba(142,68,173,0.15);background:rgba(142,68,173,0.04);font-size:0.72rem">L<sub>21</sub>·L<sub>21</sub>* + L<sub>22</sub>·L<sub>22</sub>*</div>`
        ]
      ], 'LL*');
      return prod;
    },
    derivation: `<div class="deriv-title">block multiplication rule: (AB)ᵢⱼ = Σₖ AᵢₖBₖⱼ</div>
      <div class="deriv-line"><span class="eq-label">(1,1):</span>
        <span class="t-l11">l₁₁</span><span class="t">·</span><span class="t-l11">l̄₁₁</span>
        <span class="t"> + </span><span class="t-zero">0</span><span class="t">·</span><span class="t-zero">0</span>
        <span class="t"> = </span><span class="t-l11">|l₁₁|²</span>
      </div>
      <div class="deriv-line"><span class="eq-label">(1,2):</span>
        <span class="t-l11">l₁₁</span><span class="t">·</span><span class="t-l21">L₂₁*</span>
        <span class="t"> + </span><span class="t-zero">0</span><span class="t">·</span><span class="t-l22">L₂₂*</span>
        <span class="t"> = </span><span class="t-l11">l₁₁</span><span class="t-l21">L₂₁*</span>
      </div>
      <div class="deriv-line"><span class="eq-label">(2,1):</span>
        <span class="t-l21">L₂₁</span><span class="t">·</span><span class="t-l11">l̄₁₁</span>
        <span class="t"> + </span><span class="t-l22">L₂₂</span><span class="t">·</span><span class="t-zero">0</span>
        <span class="t"> = </span><span class="t-l21">L₂₁</span><span class="t-l11">l̄₁₁</span>
      </div>
      <div class="deriv-line"><span class="eq-label">(2,2):</span>
        <span class="t-l21">L₂₁</span><span class="t">·</span><span class="t-l21">L₂₁*</span>
        <span class="t"> + </span><span class="t-l22">L₂₂</span><span class="t">·</span><span class="t-l22">L₂₂*</span>
      </div>`
  },
  {
    nav: "Match A",
    explanation: `Setting <strong>A = LL*</strong> block by block gives four equations. Each block of A must equal the corresponding block of LL*.`,
    visual: () => {
      const A = bmatrix([
        [block('a<sub>11</sub>','b-a11'), block('A<sub>12</sub>','b-a12')],
        [block('A<sub>21</sub>','b-a21'), block('A<sub>22</sub>','b-a22')]
      ], 'A');
      const prod = bmatrix([
        [
          `<div class="block b-l11" style="width:120px;font-size:0.72rem">|l<sub>11</sub>|²</div>`,
          `<div class="block b-a12" style="width:120px;font-size:0.72rem">l<sub>11</sub> L<sub>21</sub>*</div>`
        ],
        [
          `<div class="block b-a21" style="width:120px;font-size:0.72rem">L<sub>21</sub> l̄<sub>11</sub></div>`,
          `<div class="block b-a22" style="width:120px;font-size:0.72rem">L<sub>21</sub>L<sub>21</sub>* + L<sub>22</sub>L<sub>22</sub>*</div>`
        ]
      ], 'LL*');
      return A + opsign('=') + prod;
    },
    derivation: `<div class="deriv-title">four block equations</div>
      <div class="deriv-line"><span class="eq-label">(1,1):</span>
        <span class="t-a11">a₁₁</span><span class="t"> = </span><span class="t-l11">|l₁₁|²</span>
        <span class="t"> &nbsp;⟹&nbsp; </span><span class="t-l11">l₁₁ = √a₁₁</span>
      </div>
      <div class="deriv-line"><span class="eq-label">(2,1):</span>
        <span class="t-a21">A₂₁</span><span class="t"> = </span><span class="t-l21">L₂₁</span><span class="t-l11">l̄₁₁</span>
        <span class="t"> &nbsp;⟹&nbsp; </span><span class="t-l21">L₂₁ = A₂₁ / l̄₁₁</span>
      </div>
      <div class="deriv-line"><span class="eq-label">(2,2):</span>
        <span class="t-a22">A₂₂</span><span class="t"> = </span>
        <span class="t-l21">L₂₁</span><span class="t-l21">L₂₁*</span>
        <span class="t"> + </span><span class="t-l22">L₂₂</span><span class="t-l22">L₂₂*</span>
      </div>`
  },
  {
    nav: "Isolate L₂₂L₂₂*",
    explanation: `From the <strong>(2,2) block equation</strong>, we isolate the subproblem for L₂₂. Move the known rank-1 term L₂₁L₂₁* to the left side.`,
    visual: () => {
      const lhs = bmatrix([
        [`<div class="block b-schur b-active" style="width:140px;font-size:0.78rem">A<sub>22</sub> − L<sub>21</sub>L<sub>21</sub>*</div>`]
      ], "A′ (Schur)");
      const rhs = bmatrix([
        [`<div class="block b-l22 b-active" style="width:100px;font-size:0.78rem">L<sub>22</sub>L<sub>22</sub>*</div>`]
      ], "");
      return lhs + opsign('=') + rhs;
    },
    derivation: `<div class="deriv-title">isolating the subproblem</div>
      <div class="deriv-line"><span class="eq-label">from (2,2):</span>
        <span class="t-a22">A₂₂</span><span class="t"> = </span>
        <span class="t-l21">L₂₁L₂₁*</span><span class="t"> + </span><span class="t-l22">L₂₂L₂₂*</span>
      </div>
      <div class="deriv-line"><span class="eq-label">rearrange:</span>
        <span class="t-l22">L₂₂L₂₂*</span><span class="t"> = </span>
        <span class="t-a22">A₂₂</span><span class="t"> − </span><span class="t-l21">L₂₁L₂₁*</span>
      </div>
      <div class="deriv-line"><span class="eq-label">define:</span>
        <span class="t-schur">A′</span><span class="t"> := </span>
        <span class="t-a22">A₂₂</span><span class="t"> − </span><span class="t-l21">L₂₁L₂₁*</span>
        <span class="t"> &nbsp;(Schur complement of a₁₁ in A)</span>
      </div>
      <div class="deriv-line"><span class="eq-label">so:</span>
        <span class="t-schur">A′</span><span class="t"> = </span><span class="t-l22">L₂₂L₂₂*</span>
        <span class="t"> &nbsp;← same problem, size (N−1)×(N−1)!</span>
      </div>`
  },
  {
    nav: "Recurse",
    explanation: `<strong>A′ = L₂₂L₂₂*</strong> is exactly the same Cholesky problem but on an (N−1)×(N−1) matrix. We know A′ is HPD (from our earlier argument), so we can recurse. This is the complete induction.`,
    visual: () => {
      const full = bmatrix([
        [block('l<sub>11</sub>','b-l11'), zero()],
        [block('L<sub>21</sub>','b-l21'), block('L<sub>22</sub>','b-l22')]
      ], 'L (full)');
      const arrow = `<div class="transition-arrow"><div class="arrow-line">→</div><div class="arrow-label">recurse on</div></div>`;
      const sub = bmatrix([
        [`<div class="block b-l22" style="width:80px">L<sub>22</sub></div>`]
      ], 'L₂₂');
      const eq = `<div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="matrix-label-above">same problem!</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--c-schur);padding:12px 20px;border:1.5px dashed rgba(230,126,34,0.4);background:rgba(230,126,34,0.05)">
          A′ = L₂₂ L₂₂*<br>
          <span style="color:var(--ink-dim);font-size:0.6rem">size (N−1)×(N−1), A′ HPD</span>
        </div>
      </div>`;
      return full + arrow + sub + opsign('⟹') + eq;
    },
    derivation: `<div class="deriv-title">complete summary of one step</div>
      <div class="deriv-line"><span class="eq-label">① diagonal:</span>
        <span class="t-l11">l₁₁ = √a₁₁</span><span class="t"> &nbsp; (a₁₁ > 0 by HPD)</span>
      </div>
      <div class="deriv-line"><span class="eq-label">② column:</span>
        <span class="t-l21">L₂₁ = A₂₁ / l̄₁₁</span><span class="t"> &nbsp; (well-defined since l₁₁ ≠ 0)</span>
      </div>
      <div class="deriv-line"><span class="eq-label">③ Schur:</span>
        <span class="t-schur">A′ = A₂₂ − L₂₁L₂₁*</span><span class="t"> &nbsp; (HPD, by our earlier argument)</span>
      </div>
      <div class="deriv-line"><span class="eq-label">④ recurse:</span>
        <span class="t">factor </span><span class="t-schur">A′ = L₂₂L₂₂*</span><span class="t"> &nbsp; (same problem, smaller size)</span>
      </div>`
  }
];

let cur = 0;

function render(i) {
  const s = steps[i];
  document.getElementById('explanation').innerHTML = s.explanation;
  document.getElementById('visual').innerHTML = s.visual();
  document.getElementById('derivation').innerHTML = s.derivation;
  document.getElementById('counter').textContent = `step ${i+1} / ${steps.length}`;
  document.getElementById('prevBtn').disabled = i === 0;
  document.getElementById('nextBtn').disabled = i === steps.length-1;
  document.querySelectorAll('.step-btn').forEach((b,j) => b.classList.toggle('active', j===i));
}

function go(d) { cur = Math.max(0, Math.min(steps.length-1, cur+d)); render(cur); }

const nav = document.getElementById('stepsNav');
steps.forEach((s,i) => {
  const b = document.createElement('button');
  b.className = 'step-btn';
  b.textContent = s.nav;
  b.onclick = () => { cur=i; render(i); };
  nav.appendChild(b);
});

render(0);
</script>
</body>
</html>
